<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title> TBKK ตระหนักรู้ เรื่องต้นทุน </title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      .ar-ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999999;
        pointer-events: none;
      }

      .top-left-logo {
        position: absolute;
        top: 20px;
        left: 20px;
        pointer-events: auto; 
        max-width: 120px;      
        height: auto;
        filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.4)); 
        z-index: 1000002;
      }

      .lang-container {
        position: absolute;
        top: 20px;
        right: 20px;
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
        background-color: rgba(0, 0, 0, 0.75);
        padding: 12px 18px;
        border-radius: 16px;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.4);
      }

      .flags-row {
        display: flex;
        gap: 10px;
        margin-bottom: 4px;
      }

      .flag-btn {
        width: 35px;
        height: 25px;
        cursor: pointer;
        border-radius: 4px;
        border: 2px solid transparent;
        transition: all 0.2s ease;
        object-fit: cover;
      }
      .flag-btn.active {
        border-color: #FF6B35;
        transform: scale(1.1);
      }

      .control-group {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 170px;
        color: white;
        font-size: 12px;
        font-family: sans-serif;
      }

      .control-group select {
        width: 115px;
        padding: 4px;
        font-size: 11px;
        border-radius: 4px;
        border: 1px solid #ccc;
        background-color: white;
        color: #333;
        outline: none;
      }

      .control-group input[type="range"] {
        width: 115px;
        -webkit-appearance: none;
        background: #ddd;
        height: 6px;
        border-radius: 3px;
        outline: none;
      }

      .control-group input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #FF6B35;
        cursor: pointer;
        transition: transform 0.1s;
      }

      .control-group input[type="range"]::-webkit-slider-thumb:active {
        transform: scale(1.2);
      }

      #video-overlay-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 75%;
        max-width: 450px;
        display: none; 
        z-index: 1000000;
        pointer-events: auto; 
      }

      .video-wrapper {
        position: relative;
        width: 100%;
        background-color: #000000;
        border: 3px solid white;
        border-radius: 12px;
        box-shadow: 0px 10px 25px rgba(0,0,0,0.6);
        overflow: hidden;
      }

      #ar-video-player {
        width: 100%;
        display: block;
      }

      /* แถบควบคุมวิดีโอแบบ Custom */
      .video-controls {
        display: flex;
        align-items: center;
        background-color: rgba(0, 0, 0, 0.85);
        padding: 8px 12px;
        gap: 10px;
      }

      .video-btn {
        background: none;
        border: none;
        color: white;
        font-size: 16px;
        cursor: pointer;
        outline: none;
        padding: 0 5px;
      }

      .video-timeline {
        flex-grow: 1;
        -webkit-appearance: none;
        background: #555;
        height: 6px;
        border-radius: 3px;
        outline: none;
        cursor: pointer;
      }

      .video-timeline::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #0077B6;
        cursor: pointer;
      }

      .video-time-text {
        color: white;
        font-family: sans-serif;
        font-size: 11px;
        min-width: 35px;
        text-align: center;
      }

      /* ปุ่มปิด (กากบาท) รูปแบบใหม่ เหนือขอบกรอบวิดีโอด้านบนขวา */
      .video-close-top-btn {
        position: absolute;
        top: -45px; 
        right: 0px;  
        background-color: rgba(0, 0, 0, 0.7);
        color: #FF6B35;
        border: 2px solid white;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
        outline: none;
        transition: transform 0.1s ease;
        -webkit-appearance: none;
      }
      .video-close-top-btn:active {
        transform: scale(0.9);
      }

      /* ปรับปรุงกล่องคำอธิบาย (Dashboard Card) */
      #subtitles-box {
        position: relative; 
        margin-top: 12px;   
        width: 100%;        
        box-sizing: border-box;
        background-color: rgba(20, 20, 20, 0.9);
        color: #FFFFFF;
        padding: 16px;
        border-radius: 12px;
        font-family: sans-serif;
        box-shadow: 0px 8px 20px rgba(0,0,0,0.6);
        display: none;
        pointer-events: none;
        text-align: left;
      }

      /* กล่องสีครอบหัวข้อหลัก */
      .sub-title-badge {
        display: inline-block;
        background-color: #FF6B35;
        color: white;
        padding: 4px 12px;
        border-radius: 6px;
        font-size: 15px;
        font-weight: bold;
        margin-bottom: 10px;
        letter-spacing: 0.5px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      }

      /* ข้อความคำอธิบายหลัก */
      .sub-description-text {
        font-size: 14px;
        line-height: 1.6;
        color: #E0E0E0;
        font-weight: normal;
        display: block;
      }

      .speak-btn-ui {
        position: absolute;
        pointer-events: auto;
        padding: 6px 12px;
        background-color: #0077B6;
        color: white;
        border: 2px solid white;
        border-radius: 6px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 13px;
        box-shadow: 0px 4px 8px rgba(0,0,0,0.4);
        cursor: pointer;
        display: none;
        transform: translate(-50%, -50%);
        z-index: 100000;
        -webkit-appearance: none;
        white-space: nowrap;
      }
      .speak-btn-ui:active { background-color: #0096C7; }

      #freeze-btn {
        position: absolute;
        bottom: 30px;
        right: 20px;
        pointer-events: auto;
        padding: 14px 24px;
        background-color: #004E98;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 16px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        cursor: pointer;
        -webkit-appearance: none;
        z-index: 1000001;
      }
      #freeze-btn.active { background-color: #FF6B35; }
      .mindar-ui-scanning { background: none !important; }
    </style>
  </head>

  <body>
    <div class="ar-ui-layer">
      <img src="./CRTBKK.png" class="top-left-logo" alt="Logo" />

      <div class="lang-container">
        <div class="flags-row">
          <img id="flag-th" class="flag-btn active" src="https://flagcdn.com/w40/th.png" onclick="setLanguage('th')" title="ภาษาไทย" />
          <img id="flag-en" class="flag-btn" src="https://flagcdn.com/w40/gb.png" onclick="setLanguage('en')" title="English" />
          <img id="flag-jp" class="flag-btn" src="https://flagcdn.com/w40/jp.png" onclick="setLanguage('jp')" title="日本語" />
          <img id="flag-cn" class="flag-btn" src="https://flagcdn.com/w40/cn.png" onclick="setLanguage('cn')" title="中文" />
        </div>
        <div class="control-group">
          <label>🗣️เสียง : </label>
          <select id="voice-select"></select>
        </div>
        <div class="control-group">
          <label>⚡ความเร็ว : </label>
          <select id="speed-select">
            <option value="0.6">ช้ามาก (0.6x)</option>
            <option value="0.8" selected>ช้า (0.8x)</option>
            <option value="1.0">ปกติ (1.0x)</option>
            <option value="1.2">เร็ว (1.2x)</option>
          </select>
        </div>
        <div class="control-group">
          <label>🕶️ลดแสงฉาก : </label>
          <input type="range" id="dimmer-slider" min="0" max="90" value="70" oninput="updateCameraBrightness(this.value)">
        </div>
      </div>
      
      <div id="video-overlay-container">
        <button class="video-close-top-btn" onclick="closeVideoUI()">✕</button>
        
        <div class="video-wrapper">
          <video id="ar-video-player" muted playsinline></video>
          <div class="video-controls">
            <button id="video-play-btn" class="video-btn" onclick="toggleVideoPlay()">⏸</button>
            <input type="range" id="video-timeline" class="video-timeline" min="0" max="100" value="0" oninput="seekVideo(this.value)">
            <span id="video-time-text" class="video-time-text">0:00</span>
          </div>
        </div>
        <div id="subtitles-box"></div>
      </div>

      <button id="speak-ui-btn-1m" class="speak-btn-ui" onclick="speak1M()">🔊</button>
      <button id="speak-ui-btn-2m" class="speak-btn-ui" onclick="speak2M()">🔊</button>
      <button id="speak-ui-btn-3m" class="speak-btn-ui" onclick="speak3M()">🔊</button>
      <button id="speak-ui-btn-3_1m" class="speak-btn-ui" onclick="speak3_1M()">🔊</button>
      <button id="speak-ui-btn-3_2m" class="speak-btn-ui" onclick="speak3_2M()">🔊</button>
      <button id="speak-ui-btn-3_3m" class="speak-btn-ui" onclick="speak3_3M()">🔊</button>

      <button id="freeze-btn" onclick="toggleFreeze()">📌 ล็อกภาพให้ค้างหน้าจอ</button>
    </div>

    <script>
      let isFrozen = false;
      let activeTargetIndex = -1; 
      let currentLang = 'th'; 
      let allVoices = []; 
      
      const sceneEl = document.getElementById('scene');
      const cameraEl = document.getElementById('camera');
      
      const arTarget1 = document.getElementById('ar-target-1');
      const arContent1 = document.getElementById('ar-content-1');
      
      const arTarget2 = document.getElementById('ar-target-2');
      const arContent2 = document.getElementById('ar-content-2');

      const freezeBtn = document.getElementById('freeze-btn');
      const voiceSelect = document.getElementById('voice-select'); 
      const speedSelect = document.getElementById('speed-select');
      const videoContainer = document.getElementById('video-overlay-container');
      const videoPlayer = document.getElementById('ar-video-player');
      const subtitlesBox = document.getElementById('subtitles-box');

      const videoPlayBtn = document.getElementById('video-play-btn');
      const videoTimeline = document.getElementById('video-timeline');
      const videoTimeText = document.getElementById('video-time-text');

      const ent1M = document.getElementById('material-1m');
      const ent2M = document.getElementById('labor-2m'); 
      const ent3M = document.getElementById('over-3m');
      const ent3_1M = document.getElementById('over-3_1m');
      const ent3_2M = document.getElementById('over-3_2m');
      const ent3_3M = document.getElementById('over-3_3m');

      const btnUI1M = document.getElementById('speak-ui-btn-1m');
      const btnUI2M = document.getElementById('speak-ui-btn-2m'); 
      const btnUI3M = document.getElementById('speak-ui-btn-3m');
      const btnUI3_1M = document.getElementById('speak-ui-btn-3_1m');
      const btnUI3_2M = document.getElementById('speak-ui-btn-3_2m');
      const btnUI3_3M = document.getElementById('speak-ui-btn-3_3m');

      const allSpeakBtnUIs = [btnUI1M, btnUI2M, btnUI3M, btnUI3_1M, btnUI3_2M, btnUI3_3M];

      function updateCameraBrightness(val) {
        const mindarVideo = document.querySelector('body > video');
        if (mindarVideo) {
          const brightnessPercent = 100 - val;
          mindarVideo.style.filter = `brightness(${brightnessPercent}%)`;
        }
      }

      function updateVoiceList() {
        if (!('speechSynthesis' in window)) return;
        allVoices = window.speechSynthesis.getVoices();
        voiceSelect.innerHTML = ''; 

        let filterLang = 'th-TH';
        if (currentLang === 'en') filterLang = 'en-'; 
        if (currentLang === 'jp') filterLang = 'ja-JP';
        if (currentLang === 'cn') filterLang = 'zh-';

        let filteredVoices = allVoices.filter(voice => 
          voice.lang.toLowerCase().replace('_', '-').startsWith(filterLang.toLowerCase())
        );

        filteredVoices.forEach((voice) => {
          const option = document.createElement('option');
          option.value = voice.name;
          let genderLabel = "หญิง"; 
          if (voice.name.includes('Male') || voice.name.includes('David') || voice.name.includes('Kangkang')) {
            genderLabel = "ชาย";
          }
          option.innerText = `เสียง${genderLabel} (${voice.name.split(' ')[0]})`;
          voiceSelect.appendChild(option);
        });

        if(filteredVoices.length === 0) {
          const option = document.createElement('option');
          option.innerText = "ใช้เสียงมาตรฐานเครื่อง";
          voiceSelect.appendChild(option);
        }
      }

      if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = updateVoiceList;
        updateVoiceList();
      }

      function getSelectedVoice() {
        const selectedName = voiceSelect.value;
        return allVoices.find(voice => voice.name === selectedName) || null;
      }

      function resetMediaUI() {
        window.speechSynthesis.cancel();
        subtitlesBox.style.display = "none";
        videoPlayer.pause();
        videoPlayer.src = "";
        videoContainer.style.display = "none";
        videoPlayBtn.innerText = "⏸"; 
      }

      function setLanguage(lang) {
        resetMediaUI(); 
        currentLang = lang;
        document.querySelectorAll('.flag-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`flag-${lang}`).classList.add('active');
        updateVoiceList();
      }

      arTarget1.addEventListener("targetFound", () => {
        activeTargetIndex = 0;
        arContent1.setAttribute("visible", "true");
        allSpeakBtnUIs.forEach(btn => btn.style.display = "block");
      });

      arTarget1.addEventListener("targetLost", () => {
        if (!isFrozen) {
          arContent1.setAttribute("visible", "false");
          allSpeakBtnUIs.forEach(btn => btn.style.display = "none");
          resetMediaUI(); 
          if(activeTargetIndex === 0) activeTargetIndex = -1;
        }
      });

      arTarget2.addEventListener("targetFound", () => {
        activeTargetIndex = 1;
        arContent2.setAttribute("visible", "true");
      });

      arTarget2.addEventListener("targetLost", () => {
        if (!isFrozen) {
          arContent2.setAttribute("visible", "false");
          resetMediaUI();
          if(activeTargetIndex === 1) activeTargetIndex = -1;
        }
      });

      const tempV = new THREE.Vector3();
      function positionButton(entity, button, offsetX, offsetY) {
        if (entity && entity.object3D && cameraEl.components.camera) {
          entity.object3D.getWorldPosition(tempV);
          tempV.project(cameraEl.components.camera.camera);
          const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
          const y = (tempV.y * -0.5 + 0.5) * window.innerHeight;
          button.style.left = `${x + offsetX}px`; 
          button.style.top = `${y + offsetY}px`; 
        }
      }

      function updateAllButtonPositions() {
        if ((activeTargetIndex === 0 || (isFrozen && activeTargetIndex === 0)) && cameraEl) {
          positionButton(ent1M, btnUI1M, 70, -2);
          positionButton(ent2M, btnUI2M, 65, -2);
          positionButton(ent3M, btnUI3M, 80, -2);
          positionButton(ent3_1M, btnUI3_1M, 90, -2);

      function toggleFreeze() {
        isFrozen = !isFrozen;
        const mindarSystem = sceneEl.systems["mindar-image-system"];
        if (isFrozen) {
          if (mindarSystem) mindarSystem.pause(true); 
          freezeBtn.innerText = "🔄 ปล่อยภาพตามกล้อง";
          freezeBtn.classList.add("active");
        } else {
          arContent1.setAttribute("visible", "false");
          arContent2.setAttribute("visible", "false");
          allSpeakBtnUIs.forEach(btn => btn.style.display = "none");
          resetMediaUI(); 
          activeTargetIndex = -1;
          
          if (mindarSystem) {
            mindarSystem.unpause();
            if (mindarSystem.imageTargeters && mindarSystem.imageTargeters[0]) {
              mindarSystem.activeTargetIndex = -1;
            }
          }
          freezeBtn.innerText = "📌 ล็อกภาพให้ค้างหน้าจอ";
          freezeBtn.classList.remove("active");
        }
      }

      function toggleVideoPlay() {
        if (videoPlayer.paused) {
          videoPlayer.play();
          videoPlayBtn.innerText = "⏸";
          if (window.speechSynthesis.paused) {
            window.speechSynthesis.resume();
          }
        } else {
          videoPlayer.pause();
          videoPlayBtn.innerText = "▶";
          window.speechSynthesis.pause();
        }
      }

      function seekVideo(val) {
        if (videoPlayer.duration) {
          const seekTo = (val / 100) * videoPlayer.duration;
          videoPlayer.currentTime = seekTo;
        }
      }

      function closeVideoUI() {
        resetMediaUI();
      }

      videoPlayer.addEventListener('timeupdate', () => {
        if (videoPlayer.duration) {
          const percentage = (videoPlayer.currentTime / videoPlayer.duration) * 100;
          videoTimeline.value = percentage;
          
          const mins = Math.floor(videoPlayer.currentTime / 60);
          const secs = Math.floor(videoPlayer.currentTime % 60);
          videoTimeText.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
      });

      function performSpeakAction(textMap, htmlMap, videoSrc) {
        resetMediaUI(); 
        const utterance = new SpeechSynthesisUtterance();
        
        if (currentLang === 'th') {
          utterance.text = textMap.th;
          utterance.lang = "th-TH"; 
          subtitlesBox.innerHTML = htmlMap.th;
        } else if (currentLang === 'en') {
          utterance.text = textMap.en || textMap.th;
          utterance.lang = "en-US"; 
          subtitlesBox.innerHTML = htmlMap.en || htmlMap.th;
        } else if (currentLang === 'jp') {
          utterance.text = textMap.jp || textMap.th;
          utterance.lang = "ja-JP"; 
          subtitlesBox.innerHTML = htmlMap.jp || htmlMap.th;
        } else if (currentLang === 'cn') {
          utterance.text = textMap.cn || textMap.th;
          utterance.lang = "zh-CN"; 
          subtitlesBox.innerHTML = htmlMap.cn || htmlMap.th;
        }
        
        utterance.onstart = function() {
          subtitlesBox.style.display = "block";
          if(videoSrc) {
            videoPlayer.src = videoSrc;
            videoContainer.style.display = "block";
            videoPlayer.play().catch(e => console.log("Video auto-play blocked:", e));
          }
        };

        // ลบคำสั่งปิดอัตโนมัติออกเพื่อให้ทั้งกล่องวิดีโอและการ์ดสรุปเปิดค้างไว้ตามบรีฟ
        utterance.onend = function() { };
        utterance.onerror = function(e) { }
        
        utterance.rate = parseFloat(speedSelect.value);
        utterance.voice = getSelectedVoice();
        window.speechSynthesis.speak(utterance);
      }
