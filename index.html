<!DOCTYPE html>
<html>
  <head>
    <title>สื่อการสอน AR: ต้นทุนโรงงาน</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker type="pattern" url="https://thanavutp.github.io/my-ar-class/factory-marker.patt">
        
        <a-text value="FACTORY COSTS" position="0 2.2 0" color="#FFD700" align="center" width="6"></a-text>

        <a-box position="-1.5 0.5 0" scale="0.9 0.5 0.2" material="color: #FF6B35; opacity: 0.9;"
               animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
          <a-text value="1. Direct Materials" position="0 0 0.15" align="center" width="2.5" color="#FFF"></a-text>
        </a-box>

        <a-box position="0 0.5 0" scale="0.9 0.5 0.2" material="color: #004E98; opacity: 0.9;"
               animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
          <a-text value="2. Direct Labor" position="0 0 0.15" align="center" width="2.5" color="#FFF"></a-text>
        </a-box>

        <a-box position="1.5 0.5 0" scale="0.9 0.5 0.2" material="color: #06D6A0; opacity: 0.9;"
               animation="property: rotation; to: 0 360 0; loop: true; dur: 8000">
          <a-text value="3. Manufacturing Overhead" position="0 0 0.15" align="center" width="2.2" color="#000"></a-text>
        </a-box>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
    
  </body>
</html>
