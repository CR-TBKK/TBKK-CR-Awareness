<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>AR สื่อการสอน: ต้นทุนโรงงาน</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      .ar-ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999999;
        pointer-events: none;
      }

      /* แถบกล่องควบคุมภาษาและสำเนียงที่มุมขวาบน */
      .lang-container {
        position: absolute;
        top: 20px;
        right: 20px;
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
        background-color: rgba(0, 0, 0, 0.75);
        padding: 12px 16px;
        border-radius: 16px;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.4);
      }

      .flags-row {
        display: flex;
        gap: 10px;
        margin-bottom: 4px;
      }

      .flag-btn {
        width: 35px;
        height: 25px;
        cursor: pointer;
        border-radius: 4px;
        border: 2px solid transparent;
        transition: all 0.2s ease;
        object-fit: cover;
      }
      .flag-btn.active {
        border-color: #FF6B35;
        transform: scale(1.1);
      }

      .control-group {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 170px;
        color: white;
        font-size: 12px;
        font-family: sans-serif;
      }

      .control-group select {
        width: 115px;
        padding: 4px;
        font-size: 11px;
        border-radius: 4px;
        border: 1px solid #ccc;
        background-color: white;
        color: #333;
        outline: none;
      }

      /* [เพิ่มใหม่] กล่องข้อความซับไตเติล (ลอยอยู่ด้านล่างหน้าจอ อ่านง่าย ชัดเจน) */
      #subtitles-box {
        position: absolute;
        bottom: 110px; /* ลอยอยู่เหนี่ปุ่มล็อกภาพ */
        left: 50%;
        transform: translateX(-50%);
        width: 85%;
        max-width: 600px;
        background-color: rgba(0, 0, 0, 0.75);
        color: #FFFFFF;
        padding: 10px 18px;
        border-radius: 10px;
        font-family: sans-serif;
        font-size: 15px;
        font-weight: bold;
        text-align: center;
        line-height: 1.4;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.5);
        display: none; /* เริ่มต้นจะซ่อนไว้ จะโผล่มาเฉพาะตอนมีเสียงพูด */
        pointer-events: none; /* ป้องกันไม่ให้บังการจิ้มหน้าจอส่วนอื่น */
        z-index: 1000001;
      }

      /* ปุ่มที่ 1: ฟังเสียง วัตถุดิบทางตรง (ท้ายรูป 1M.png) */
      #speak-ui-btn {
        position: absolute;
        pointer-events: auto;
        padding: 6px 12px;
        background-color: #0077B6;
        color: white;
        border: 2px solid white;
        border-radius: 6px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 13px;
        box-shadow: 0px 4px 8px rgba(0,0,0,0.4);
        cursor: pointer;
        display: none;
        transform: translate(-50%, -50%);
        z-index: 100000;
        -webkit-appearance: none;
        white-space: nowrap;
      }

      /* ปุ่มที่ 2: ฟังเสียง ค่าแรงทางตรง (ท้ายรูป 2M.png) */
      #speak-ui-btn2 {
        position: absolute;
        pointer-events: auto;
        padding: 6px 12px;
        background-color: #0077B6;
        color: white;
        border: 2px solid white;
        border-radius: 6px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 13px;
        box-shadow: 0px 4px 8px rgba(0,0,0,0.4);
        cursor: pointer;
        display: none;
        transform: translate(-50%, -50%);
        z-index: 100000;
        -webkit-appearance: none;
        white-space: nowrap;
      }

      #freeze-btn {
        position: absolute;
        bottom: 30px;
        right: 20px;
        pointer-events: auto;
        padding: 14px 24px;
        background-color: #004E98;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 16px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        cursor: pointer;
        -webkit-appearance: none;
      }
      #freeze-btn.active { background-color: #FF6B35; }
      .mindar-ui-scanning { background: none !important; }
    </style>
  </head>

  <body>
    <div class="ar-ui-layer">
      <!-- กล่องจัดการภาษา / สำเนียง -->
      <div class="lang-container">
        <div class="flags-row">
          <img id="flag-th" class="flag-btn active" src="https://flagcdn.com/w40/th.png" onclick="setLanguage('th')" title="ภาษาไทย" />
          <img id="flag-en" class="flag-btn" src="https://flagcdn.com/w40/gb.png" onclick="setLanguage('en')" title="English" />
          <img id="flag-jp" class="flag-btn" src="https://flagcdn.com/w40/jp.png" onclick="setLanguage('jp')" title="日本語" />
        </div>
        <div class="control-group">
          <label>🗣️ เสียง:</label>
          <select id="voice-select"></select>
        </div>
        <div class="control-group">
          <label>⚡ ความเร็ว:</label>
          <select id="speed-select">
            <option value="0.6">ช้ามาก (0.6x)</option>
            <option value="0.8" selected>ช้า (0.8x)</option>
            <option value="1.0">ปกติ (1.0x)</option>
            <option value="1.2">เร็ว (1.2x)</option>
          </select>
        </div>
      </div>
      
      <!-- [เพิ่มใหม่] กล่องซับไตเติลบนหน้าจอ -->
      <div id="subtitles-box"></div>

      <button id="speak-ui-btn" onclick="speakCustomIngot()">🔊</button>
      <button id="speak-ui-btn2" onclick="speakCustomLabor()">🔊</button>
      <button id="freeze-btn" onclick="toggleFreeze()">📌 ล็อกภาพให้ค้างหน้าจอ</button>
    </div>

    <a-scene id="scene" mindar-image="imageTargetSrc: ./What_is_cost.mind; uiScanning: yes; filterMinCF: 0.0001; filterBeta: 0.001;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-entity id="ar-content" visible="false">
          
          <a-image src="./Manu_Cost_sign.png" position="-0.28 0.16 0" scale="0.45 0.039 1"></a-image>
          <a-image src="./Admin_Cost_sign.png" position="0.22 0.16 0" scale="0.45 0.039 1"></a-image>

          <a-image id="material-1m" src="./1M.png" position="-0.42 0.12 0" scale="0.18 0.05 1"></a-image> 
          
          <a-image src="./ingot.png" position="-0.38 0.04 0" scale="0.09 0.07 1"></a-image> 
        
          <a-image id="labor-2m" src="./2M.png" position="-0.42 -0.02 0" scale="0.18 0.06 1"></a-image>
          <a-image src="./Direct_Labor.png" position="-0.40 -0.12 0" scale="0.17 0.11 1"></a-image>
          
          <a-image src="./Office.png" position="0.28 0.01 0" scale="0.09 0.09 1"></a-image>

        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      let isFrozen = false;
      let targetFound = false;
      let currentLang = 'th'; 
      let allVoices = []; 
      
      const sceneEl = document.getElementById('scene');
      const cameraEl = document.getElementById('camera');
      const freezeBtn = document.getElementById('freeze-btn');
      const speakUiBtn = document.getElementById('speak-ui-btn');
      const speakUiBtn2 = document.getElementById('speak-ui-btn2'); 
      const voiceSelect = document.getElementById('voice-select'); 
      const speedSelect = document.getElementById('speed-select');
      const subtitlesBox = document.getElementById('subtitles-box'); // [เพิ่มใหม่] ตัวแปรกล่องซับ
      const material1M = document.getElementById('material-1m');
      const labor2M = document.getElementById('labor-2m'); 
      const arTarget = document.getElementById('ar-target');
      const arContent = document.getElementById('ar-content');

      function updateVoiceList() {
        if (!('speechSynthesis' in window)) return;
        allVoices = window.speechSynthesis.getVoices();
        voiceSelect.innerHTML = ''; 

        let filterLang = 'th-TH';
        if (currentLang === 'en') filterLang = 'en-'; 
        if (currentLang === 'jp') filterLang = 'ja-JP';

        let filteredVoices = allVoices.filter(voice => 
          voice.lang.toLowerCase().replace('_', '-').startsWith(filterLang.toLowerCase())
        );

        filteredVoices.forEach((voice) => {
          const option = document.createElement('option');
          option.value = voice.name;
          let genderLabel = "หญิง"; 
          if (voice.name.includes('Male') || voice.name.includes('David') || voice.name.includes('Ravi') || voice.name.includes('Google US English')) {
            genderLabel = "ชาย";
          }
          option.innerText = `เสียง${genderLabel} (${voice.name.split(' ')[0]})`;
          voiceSelect.appendChild(option);
        });

        if(filteredVoices.length === 0) {
          const option = document.createElement('option');
          option.innerText = "ใช้เสียงมาตรฐานเครื่อง";
          voiceSelect.appendChild(option);
        }
      }

      if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = updateVoiceList;
        updateVoiceList();
      }

      function getSelectedVoice() {
        const selectedName = voiceSelect.value;
        return allVoices.find(voice => voice.name === selectedName) || null;
      }

      function setLanguage(lang) {
        window.speechSynthesis.cancel(); 
        subtitlesBox.style.display = "none"; // ปิดซับไตเติลทันทีเมื่อสลับภาษา
        currentLang = lang;
        document.querySelectorAll('.flag-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`flag-${lang}`).classList.add('active');
        updateVoiceList();
      }

      arTarget.addEventListener("targetFound", () => {
        arContent.setAttribute("visible", "true");
        speakUiBtn.style.display = "block";
        speakUiBtn2.style.display = "block"; 
        targetFound = true;
      });

      arTarget.addEventListener("targetLost", () => {
        if (!isFrozen) {
          arContent.setAttribute("visible", "false");
          speakUiBtn.style.display = "none";
          speakUiBtn2.style.display = "none"; 
          subtitlesBox.style.display = "none"; // ปิดซับเมื่อกล้องหลุด
          targetFound = false;
        }
      });

      const tempV = new THREE.Vector3();
      const tempV2 = new THREE.Vector3(); 
      
      function updateButtonPosition() {
        if ((targetFound || isFrozen) && cameraEl) {
          if (material1M) {
            material1M.object3D.getWorldPosition(tempV);
            tempV.project(cameraEl.components.camera.camera);
            const x1 = (tempV.x * .5 + .5) * window.innerWidth;
            const y1 = (tempV.y * -.5 + .5) * window.innerHeight;
            speakUiBtn.style.left = `${x1 + 75}px`; 
            speakUiBtn.style.top = `${y1 - 8}px`; 
          }
          if (labor2M) {
            labor2M.object3D.getWorldPosition(tempV2);
            tempV2.project(cameraEl.components.camera.camera);
            const x2 = (tempV2.x * .5 + .5) * window.innerWidth;
            const y2 = (tempV2.y * -.5 + .5) * window.innerHeight;
            speakUiBtn2.style.left = `${x2 + 70}px`; 
            speakUiBtn2.style.top = `${y2 - 8}px`; 
          }
        }
        requestAnimationFrame(updateButtonPosition);
      }
      requestAnimationFrame(updateButtonPosition);

      function toggleFreeze() {
        isFrozen = !isFrozen;
        const mindarSystem = sceneEl.systems["mindar-image-system"];
        if (isFrozen) {
          if (mindarSystem) mindarSystem.pause(true); 
          freezeBtn.innerText = "🔄 ปล่อยภาพตามกล้อง";
          freezeBtn.classList.add("active");
        } else {
          arContent.setAttribute("visible", "false");
          speakUiBtn.style.display = "none";
          speakUiBtn2.style.display = "none"; 
          subtitlesBox.style.display = "none"; // ปิดซับเมื่อปลดล็อกภาพ
          targetFound = false;
          if (mindarSystem) {
            mindarSystem.unpause();
            if (mindarSystem.imageTargeters && mindarSystem.imageTargeters[0]) {
              mindarSystem.activeTargetIndex = -1; 
            }
          }
          freezeBtn.innerText = "📌 ล็อกภาพให้ค้างหน้าจอ";
          freezeBtn.classList.remove("active");
        }
      }

      // เสียงตัวที่ 1: วัตถุดิบทางตรง + ระบบผูกซับไตเติล
      function speakCustomIngot() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance();
        
        if (currentLang === 'th') {
          utterance.text = "วัตถุดิบทางตรง หมายถึง  วัตถุดิบหลักที่ใช้ในการผลิต เช่น อลูมิเนียม";
          utterance.lang = "th-TH"; 
        } else if (currentLang === 'en') {
          utterance.text = "Direct materials refer to the primary raw materials used in production, such as aluminum.";
          utterance.lang = "en-US"; 
        } else if (currentLang === 'jp') {
          utterance.text = "直接材料費とは、アルミニウムなど、製品の製造に直接使用される主要な原材料のことです。";
          utterance.lang = "ja-JP"; 
        }
        
        // [เพิ่มใหม่] ผูกการทำงานเปิด-ปิดซับไตเติลตามสถานะการพูด
        utterance.onstart = function() {
          subtitlesBox.innerText = utterance.text; // ใส่ข้อความตรงกับเสียง
          subtitlesBox.style.display = "block";   // เปิดกล่องซับ
        };
        utterance.onend = function() {
          subtitlesBox.style.display = "none";    // ปิดกล่องซับเมื่อพูดจบ
        };
        
        utterance.rate = parseFloat(speedSelect.value);
        utterance.voice = getSelectedVoice();
        window.speechSynthesis.speak(utterance);
      }

      // เสียงตัวที่ 2: ค่าแรงทางตรง + ระบบผูกซับไตเติล
      function speakCustomLabor() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance();
        
        if (currentLang === 'th') {
          utterance.text = "ค่าแรงทางตรง หมายถึง ค่าจ้างหรือค่าตอบแทนของพนักงานที่ทำงานในไลน์ผลิตโดยตรง";
          utterance.lang = "th-TH"; 
        } else if (currentLang === 'en') {
          utterance.text = "Direct labor refers to the wages or compensation paid to workers who are directly involved in the production line.";
          utterance.lang = "en-US"; 
        } else if (currentLang === 'jp') {
          utterance.text = "直接労務費とは、製造ラインで直接働く作業員に支払われる賃金や手当てのことです。";
          utterance.lang = "ja-JP"; 
        }
        
        // [เพิ่มใหม่] ผูกการทำงานเปิด-ปิดซับไตเติลตามสถานะการพูด
        utterance.onstart = function() {
          subtitlesBox.innerText = utterance.text;
          subtitlesBox.style.display = "block";
        };
        utterance.onend = function() {
          subtitlesBox.style.display = "none";
        };
        
        utterance.rate = parseFloat(speedSelect.value);
        utterance.voice = getSelectedVoice();
        window.speechSynthesis.speak(utterance);
      }
    </script>
  </body>
</html>
