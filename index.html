<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>AR สื่อการสอน: ต้นทุนโรงงาน</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      .ar-ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999999;
        pointer-events: none;
      }

      .menu-container {
        position: absolute;
        top: 15px;
        left: 15px;
        display: flex;
        gap: 10px;
        pointer-events: auto;
      }

      .menu-btn {
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 14px;
        background-color: #E0E0E0;
        color: #333;
        cursor: pointer;
        box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
      }

      .menu-btn.active {
        background-color: #004E98;
        color: white;
      }

      #freeze-btn {
        position: absolute;
        bottom: 30px;
        right: 20px;
        pointer-events: auto;
        padding: 14px 24px;
        background-color: #2F3E46;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 16px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        cursor: pointer;
      }
      #freeze-btn.active { background-color: #FF6B35; }
      .mindar-ui-scanning { background: none !important; }
    </style>
  </head>

  <body>
    <div class="ar-ui-layer">
      <div class="menu-container">
        <button id="btn-dm" class="menu-btn active" onclick="switchMode('dm')">📦 ต้นทุนการผลิต (A)</button>
        <button id="btn-dl" class="menu-btn" onclick="switchMode('dl')">🏢 ค่าใช้จ่ายบริหาร (B)</button>
      </div>
      
      <button id="freeze-btn" onclick="toggleFreeze()">📌 ล็อกภาพค้างหน้าจอ</button>
    </div>

    <a-scene id="scene" mindar-image="imageTargetSrc: ./A_Manu_Cost.mind; uiScanning: yes;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" raycaster="objects: .clickable; far: 100; interval: 100" cursor="fuse: false; rayOrigin: mouse">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        
        <a-entity id="content-dm" visible="false">
          <a-image src="./Ingot.png" position="-0.25 0.05 0" scale="0.25 0.18 1"></a-image>
          <a-text value="1. Direct Materials" position="-0.25 -0.08 0" scale="0.32 0.32 0.32" color="#FF6B35" align="center"></a-text>
          <a-plane class="clickable" position="-0.25 0 0.02" width="0.3" height="0.3" material="opacity: 0.0; transparent: true" onclick="speakIngot()"></a-plane>

          <a-image src="./Labor.png" position="0.25 0.05 0" scale="0.25 0.18 1"></a-image>
          <a-text value="2. Direct Labor" position="0.25 -0.08 0" scale="0.32 0.32 0.32" color="#004E98" align="center"></a-text>
          <a-plane class="clickable" position="0.25 0 0.02" width="0.3" height="0.3" material="opacity: 0.0; transparent: true" onclick="speakLabor()"></a-plane>
        </a-entity>

        <a-entity id="content-dl" visible="false">
          <a-image src="./Office.png" position="0 0.05 0" scale="0.38 0.28 1"></a-image>
          <a-text value="Administrative Expenses" position="0 -0.12 0" scale="0.45 0.45 0.45" color="#2F3E46" align="center"></a-text>
          <a-plane class="clickable" position="0 0 0.02" width="0.45" height="0.45" material="opacity: 0.0; transparent: true" onclick="speakOffice()"></a-plane>
        </a-entity>

      </a-entity>
    </a-scene>

    <script>
      let isFrozen = false;
      let currentMode = 'dm';
      let targetFound = false;

      const sceneEl = document.getElementById('scene');
      const freezeBtn = document.getElementById('freeze-btn');
      const arTarget = document.getElementById('ar-target');
      
      const contentDm = document.getElementById('content-dm');
      const contentDl = document.getElementById('content-dl');

      // จัดการ Event การตรวจจับภาพแบบ Single Listener (ช่วยประหยัดแรงเครื่องและเสถียรขึ้น)
      arTarget.addEventListener("targetFound", () => {
        targetFound = true;
        if (currentMode === 'dm') {
          contentDm.setAttribute("visible", "true");
        } else {
          contentDl.setAttribute("visible", "true");
        }
      });

      arTarget.addEventListener("targetLost", () => {
        targetFound = false;
        if (!isFrozen) {
          contentDm.setAttribute("visible", "false");
          contentDl.setAttribute("visible", "false");
        }
      });

      // ฟังก์ชันสลับไฟล์มาร์กเกอร์ .mind โดยสลับที่แอตทริบิวต์หลักของ Scene (กล้องไม่มีวันดับ)
      function switchMode(mode) {
        if (mode === currentMode) return;
        window.speechSynthesis.cancel();
        
        if (isFrozen) toggleFreeze();

        // ซ่อนชิ้นงานทั้งหมดก่อนสลับโหมด
        contentDm.setAttribute("visible", "false");
        contentDl.setAttribute("visible", "false");

        const btnDm = document.getElementById('btn-dm');
        const btnDl = document.getElementById('btn-dl');
        const mindarSystem = sceneEl.systems["mindar-image-system"];

        if (mode === 'dm') {
          btnDm.classList.add('active');
          btnDl.classList.remove('active');
          currentMode = 'dm';
          
          // สั่งตัวระบบหลักให้เปลี่ยนไปสแกนไฟล์ A
          sceneEl.setAttribute("mindar-image", "imageTargetSrc: ./A_Manu_Cost.mind; uiScanning: yes;");
        } else {
          btnDl.classList.add('active');
          btnDm.classList.remove('active');
          currentMode = 'dl';
          
          // สั่งตัวระบบหลักให้เปลี่ยนไปสแกนไฟล์ B
          sceneEl.setAttribute("mindar-image", "imageTargetSrc: ./B_Admin_Cost.mind; uiScanning: yes;");
        }
        
        // บังคับให้ระบบ AR เริ่มต้นค้นหาภาพใหม่ทันทีหลังจากสลับโหมด
        if (mindarSystem) {
          mindarSystem.unpause();
        }
      }

      function toggleFreeze() {
        isFrozen = !isFrozen;
        const mindarSystem = sceneEl.systems["mindar-image-system"];
        
        if (isFrozen) {
          if (mindarSystem) mindarSystem.pause(true);
          freezeBtn.innerText = "🔄 ปล่อยภาพตามกล้อง";
          freezeBtn.classList.add("active");
        } else {
          contentDm.setAttribute("visible", "false");
          contentDl.setAttribute("visible", "false");
          if (mindarSystem) mindarSystem.unpause();
          freezeBtn.innerText = "📌 ล็อกภาพค้างหน้าจอ";
          freezeBtn.classList.remove("active");
        }
      }

      function speakIngot() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("วัตถุดิบทางตรง Direct Materials วัตถุดิบหลักที่ใช้ในการผลิตสินค้า เช่น อลูมิเนียม");
        utterance.lang = "th-TH"; utterance.rate = 0.95; window.speechSynthesis.speak(utterance);
      }

      function speakLabor() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("ค่าแรงงานทางตรง Direct Labor ค่าแรงของพนักงานฝ่ายผลิตที่มีหน้าที่เปลี่ยนสภาพวัตถุดิบให้เป็นสินค้าโดยตรง");
        utterance.lang = "th-TH"; utterance.rate = 0.95; window.speechSynthesis.speak(utterance);
      }

      function speakOffice() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("ค่าใช้จ่ายในการบริหาร Administrative Expenses ค่าใช้จ่ายที่เกิดขึ้นในการบริหารงานทั่วไป เช่น เงินเดือนพนักงานออฟฟิศ ค่าน้ำไฟสำนักงาน");
        utterance.lang = "th-TH"; utterance.rate = 0.95; window.speechSynthesis.speak(utterance);
      }
    </script>
  </body>
</html>
