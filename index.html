<!DOCTYPE html>
<html>
  <head>

    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      #lang-select-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(15, 15, 15, 0.98);
        z-index: 100000000;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
      }
      .lang-select-modal {
        background-color: #222222;
        padding: 25px;
        border-radius: 20px;
        border: 2px solid #FF6B35;
        text-align: center;
        max-width: 400px;
        width: 85%;
        box-shadow: 0px 10px 30px rgba(0,0,0,0.7);
      }
      .lang-select-modal h2 {
        color: white;
        font-family: sans-serif;
        font-size: 16px;
        margin-bottom: 20px;
        line-height: 1.6;
      }
      .lang-select-buttons {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .lang-select-buttons button {
        background-color: #0077B6;
        color: white;
        border: 2px solid white;
        border-radius: 10px;
        padding: 14px;
        font-family: sans-serif;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.1s ease, background-color 0.2s;
        -webkit-appearance: none;
        pointer-events: auto;
      }
      .lang-select-buttons button:active {
        transform: scale(0.96);
        background-color: #0096C7;
      }

      .ar-ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999999;
        pointer-events: none;
        display: none; 
      }

      #intro-video-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999999;
        display: none; 
        flex-direction: column;
        align-items: center;
        justify-content: center;
        pointer-events: auto;
      }
      
      #intro-video-player {
        width: 92%;
        max-width: 600px;
        border: none !important;
        border-radius: 0px !important;
        box-shadow: none !important;
        background: transparent !important;
      }
      
      .intro-skip-msg {
        color: rgba(255,255,255,0.9);
        font-family: sans-serif;
        font-size: 14px;
        margin-top: 15px;
        letter-spacing: 0.5px;
        text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
      }

      #intro-subtitles {
        background-color: rgba(20, 20, 20, 0.85);
        color: #FFFFFF;
        padding: 14px 22px;
        border-radius: 10px;
        font-family: sans-serif;
        font-size: 14px;
        line-height: 1.6;
        max-width: 85%;
        text-align: center;
        margin-top: 15px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        text-shadow: 0px 1px 2px rgba(0,0,0,0.8);
      }

      .logo-campaign-box {
        position: absolute;
        top: 20px;
        left: 20px;
        pointer-events: auto; 
        display: flex;
        flex-direction: column;
        gap: 8px;
        z-index: 99999;
      }

      .top-left-logo {
        max-width: 120px;       
        height: auto;
        filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.4)); 
      }

      .campaign-title {
        color: #FFFFFF;
        font-family: sans-serif;
        font-size: 16px;
        font-weight: bold;
        text-shadow: 0px 2px 4px rgba(0,0,0,0.8);
        margin: 4px 0 0 2px;
        letter-spacing: 0.5px;
      }

      .campaign-btn {
        background-color: #E63946;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        padding: 8px 18px;
        font-family: sans-serif;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
        text-align: left;
        line-height: 1.3;
        transition: transform 0.1s ease;
        -webkit-appearance: none;
      }
      .campaign-btn:active {
        transform: scale(0.95);
        background-color: #D62828;
      }

      .lang-container {
        position: absolute;
        top: 20px;
        right: 20px;
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
        background-color: rgba(0, 0, 0, 0.75);
        padding: 12px 18px;
        border-radius: 16px;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.4);
      }

      .flags-row {
        display: flex;
        gap: 10px;
        margin-bottom: 4px;
      }

      .flag-btn {
        width: 35px;
        height: 25px;
        cursor: pointer;
        border-radius: 4px;
        border: 2px solid transparent;
        transition: all 0.2s ease;
        object-fit: cover;
      }
      .flag-btn.active {
        border-color: #FF6B35;
        transform: scale(1.1);
      }

      .control-group {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 170px;
        color: white;
        font-size: 12px;
        font-family: sans-serif;
      }

      .control-group select {
        width: 115px;
        padding: 4px;
        font-size: 11px;
        border-radius: 4px;
        border: 1px solid #ccc;
        background-color: white;
        color: #333;
        outline: none;
      }

      .control-group input[type="range"] {
        width: 115px;
        -webkit-appearance: none;
        background: #ddd;
        height: 6px;
        border-radius: 3px;
        outline: none;
      }

      .control-group input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #FF6B35;
        cursor: pointer;
        transition: transform 0.1s;
      }

      .control-group input[type="range"]::-webkit-slider-thumb:active {
        transform: scale(1.2);
      }

      #video-overlay-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 92%;              
        max-width: 600px;        
        display: none; 
        z-index: 10000000;
        pointer-events: auto; 
      }

      .video-wrapper {
        position: relative;
        width: 100%;
        background-color: #000000;
        border: 3px solid white;
        border-radius: 12px;
        box-shadow: 0px 10px 25px rgba(0,0,0,0.6);
        overflow: hidden;
      }

      #ar-video-player {
        width: 100%;
        display: block;
      }

      .video-controls {
        display: flex;
        align-items: center;
        background-color: rgba(0, 0, 0, 0.85);
        padding: 8px 12px;
        gap: 10px;
      }

      .video-btn {
        background: none;
        border: none;
        color: white;
        font-size: 16px;
        cursor: pointer;
        outline: none;
        padding: 0 5px;
      }

      .video-timeline {
        flex-grow: 1;
        -webkit-appearance: none;
        background: #555;
        height: 6px;
        border-radius: 3px;
        outline: none;
        cursor: pointer;
      }

      .video-timeline::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #0077B6;
        cursor: pointer;
      }

      .video-time-text {
        color: white;
        font-family: sans-serif;
        font-size: 11px;
        min-width: 35px;
        text-align: center;
      }

      .video-close-top-btn {
        position: absolute;
        top: -45px; 
        right: 0px;    
        background-color: rgba(0, 0, 0, 0.7);
        color: #FF6B35;
        border: 2px solid white;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
        outline: none;
        transition: transform 0.1s ease;
        -webkit-appearance: none;
      }
      .video-close-top-btn:active {
        transform: scale(0.9);
      }

      #subtitles-box {
        position: relative; 
        margin-top: 12px;   
        width: 100%;        
        box-sizing: border-box;
        background-color: rgba(20, 20, 20, 0.9);
        color: #FFFFFF;
        padding: 16px;
        border-radius: 12px;
        font-family: sans-serif;
        box-shadow: 0px 8px 20px rgba(0,0,0,0.6);
        display: none;
        pointer-events: none;
        text-align: left;
      }

      .sub-title-badge {
        display: inline-block;
        background-color: #FF6B35;
        color: white;
        padding: 4px 12px;
        border-radius: 6px;
        font-size: 15px;
        font-weight: bold;
        margin-bottom: 10px;
        letter-spacing: 0.5px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      }

      .sub-title-badge.value-badge {
        background-color: #2A9D8F;
      }

      .sub-description-text {
        font-size: 14px;
        line-height: 1.6;
        color: #E0E0E0;
        font-weight: normal;
        display: block;
      }

      .speak-btn-ui {
        position: absolute;
        pointer-events: auto;
        padding: 6px 12px;
        background-color: #0077B6;
        color: white;
        border: 2px solid white;
        border-radius: 6px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 13px;
        box-shadow: 0px 4px 8px rgba(0,0,0,0.4);
        cursor: pointer;
        display: none;
        transform: translate(-50%, -50%);
        z-index: 100000;
        -webkit-appearance: none;
        white-space: nowrap;
      }
      .speak-btn-ui:active { background-color: #0096C7; }

      #freeze-btn {
        position: absolute;
        bottom: 30px;
        right: 20px;
        pointer-events: auto;
        padding: 14px 24px;
        background-color: #004E98;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 16px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        cursor: pointer;
        -webkit-appearance: none;
        z-index: 10001;
      }
      #freeze-btn.active { background-color: #FF6B35; }
      .mindar-ui-scanning { background: none !important; }
    </style>
  </head>

  <body>
    <div id="lang-select-overlay">
      <div class="lang-select-modal">
        <h2>กรุณาเลือกภาษาเริ่มต้น<br>Please Select Language<br>言語を選択してください</h2>
        <div class="lang-select-buttons">
          <button onclick="selectInitialLanguage('th')">🇹🇭 ภาษาไทย</button>
          <button onclick="selectInitialLanguage('en')">🇬🇧 English</button>
          <button onclick="selectInitialLanguage('jp')">🇯🇵 日本語</button>
        </div>
      </div>
    </div>

    <div id="intro-video-overlay" onclick="closeIntroVideo()">
      <video id="intro-video-player" src="./INTRO_CR.mp4" playsinline preload="auto"></video>
      <div id="intro-subtitles"></div>
      <div id="intro-skip-text" class="intro-skip-msg">แตะหน้าจอตรงไหนก็ได้เพื่อเข้าสู่ระบบ AR ✕</div>
    </div>

    <div class="ar-ui-layer">
      <div class="logo-campaign-box">
        <img src="./CRTBKK.png" class="top-left-logo" alt="Logo" />
        <div class="campaign-title">🎬 ละคร "ต้นทุน" คุณธรรม</div>
        <button class="campaign-btn" onclick="playCampaignEP1()">
          ▶ 1. ก็แค่...บาทเดียว (คลิ๊ก)<br>
          <span style="font-size: 14px; font-weight: normal; opacity: 0.85;">It's just...One-BAHT (CLICK)</span>
        </button>
      </div>

      <div class="lang-container">
        <div class="flags-row">
          <img id="flag-th" class="flag-btn active" src="./th.png" onclick="setLanguage('th')" title="ภาษาไทย" />
          <img id="flag-en" class="flag-btn" src="./gb.png" onclick="setLanguage('en')" title="English" />
          <img id="flag-jp" class="flag-btn" src="./jp.png" onclick="setLanguage('jp')" title="日本語" />
          <img id="flag-cn" class="flag-btn" src="./cn.png" onclick="setLanguage('cn')" title="中文" />
        </div>
        <div class="control-group">
          <label>🗣️เสียง : </label>
          <select id="voice-select"></select>
        </div>
        <div class="control-group">
          <label>⚡ความเร็ว : </label>
          <select id="speed-select">
            <option value="0.6">ช้ามาก (0.6x)</option>
            <option value="0.8" selected>ช้า (0.8x)</option>
            <option value="1.0">ปกติ (1.0x)</option>
            <option value="1.2">เร็ว (1.2x)</option>
          </select>
        </div>
        <div class="control-group">
          <label>🕶️ลดแสงฉาก : </label>
          <input type="range" id="dimmer-slider" min="0" max="90" value="70" oninput="updateCameraBrightness(this.value)">
        </div>
      </div>
      
      <div id="video-overlay-container">
        <button class="video-close-top-btn" onclick="closeVideoUI()">✕</button>
        
        <div class="video-wrapper">
          <video id="ar-video-player" playsinline></video>
          <div class="video-controls">
            <button id="video-play-btn" class="video-btn" onclick="toggleVideoPlay()">⏸</button>
            <input type="range" id="video-timeline" class="video-timeline" min="0" max="100" value="0" oninput="seekVideo(this.value)">
            <span id="video-time-text" class="video-time-text">0:00</span>
          </div>
        </div>
        <div id="subtitles-box"></div>
      </div>

      <button id="speak-ui-btn-1m" class="speak-btn-ui" onclick="speak1M()">🔊</button>
      <button id="speak-ui-btn-2m" class="speak-btn-ui" onclick="speak2M()">🔊</button>
      <button id="speak-ui-btn-3m" class="speak-btn-ui" onclick="speak3M()">🔊</button>
      <button id="speak-ui-btn-3_1m" class="speak-btn-ui" onclick="speak3_1M()">🔊</button>
      <button id="speak-ui-btn-3_2m" class="speak-btn-ui" onclick="speak3_2M()">🔊</button>
      <button id="speak-ui-btn-3_3m" class="speak-btn-ui" onclick="speak3_3M()">🔊</button>
      <button id="speak-ui-btn-1a" class="speak-btn-ui" onclick="speak1A()">🔊</button>
      <button id="speak-ui-btn-2a" class="speak-btn-ui" onclick="speak2A()">🔊</button>

      <button id="speak-ui-btn-1muda" class="speak-btn-ui" onclick="speak1MUDA()">🔊</button>
      <button id="speak-ui-btn-2muda" class="speak-btn-ui" onclick="speak2MUDA()">🔊</button>

      <button id="speak-ui-btn-4muda" class="speak-btn-ui" onclick="speak4MUDA()">🔊</button>
      <button id="speak-ui-btn-5muda" class="speak-btn-ui" onclick="speak5MUDA()">🔊</button>
      <button id="speak-ui-btn-6muda" class="speak-btn-ui" onclick="speak6MUDA()">🔊</button>
      <button id="speak-ui-btn-7muda" class="speak-btn-ui" onclick="speak7MUDA()">🔊</button>

      <button id="speak-ui-btn-1value" class="speak-btn-ui" onclick="speak1VALUE()">🔊</button>
      <button id="speak-ui-btn-2value" class="speak-btn-ui" onclick="speak2VALUE()">🔊</button>
      <button id="speak-ui-btn-3value" class="speak-btn-ui" onclick="speak3VALUE()">🔊</button>
      <button id="speak-ui-btn-4value" class="speak-btn-ui" onclick="speak4VALUE()">🔊</button>
      <button id="speak-ui-btn-5value" class="speak-btn-ui" onclick="speak5VALUE()">🔊</button>
      <button id="speak-ui-btn-6value" class="speak-btn-ui" onclick="speak6VALUE()">🔊</button>
      <button id="speak-ui-btn-7value" class="speak-btn-ui" onclick="speak7VALUE()">🔊</button>

      <button id="freeze-btn" onclick="toggleFreeze()">📌 ล็อกภาพให้ค้างหน้าจอ</button>
    </div>

    <script>

      const introVideoElement = document.getElementById('intro-video-player');

      // Elements Target 1

      const ent2M = document.getElementById('labor-2m'); 
      const ent3M = document.getElementById('over-3m');
      const ent3_1M = document.getElementById('over-3_1m');
      const ent3_2M = document.getElementById('over-3_2m');
      const ent3_3M = document.getElementById('over-3_3m');
      const ent1A = document.getElementById('admin-1a');
      const ent2A = document.getElementById('admin-2a');

      // Elements Target 2 (7 MUDA)
      const entMuda1 = document.getElementById('muda-1'); const entMuda2 = document.getElementById('muda-2'); const entMuda3 = document.getElementById('muda-3'); const entMuda4 = document.getElementById('muda-4'); const entMuda5 = document.getElementById('muda-5'); const entMuda6 = document.getElementById('muda-6'); const entMuda7 = document.getElementById('muda-7');

      // Elements Target 2 (7 VALUE)
      const entValue1 = document.getElementById('value-1'); const entValue2 = document.getElementById('value-2'); const entValue3 = document.getElementById('value-3'); const entValue4 = document.getElementById('value-4'); const entValue5 = document.getElementById('value-5'); const entValue6 = document.getElementById('value-6'); const entValue7 = document.getElementById('value-7');

      // UI Buttons Target 1
      const btnUI1M = document.getElementById('speak-ui-btn-1m'); const btnUI2M = document.getElementById('speak-ui-btn-2m'); const btnUI3M = document.getElementById('speak-ui-btn-3m'); const btnUI3_1M = document.getElementById('speak-ui-btn-3_1m'); const btnUI3_2M = document.getElementById('speak-ui-btn-3_2m'); const btnUI3_3M = document.getElementById('speak-ui-btn-3_3m'); const btnUI1A = document.getElementById('speak-ui-btn-1a'); const btnUI2A = document.getElementById('speak-ui-btn-2a');

      // UI Buttons Target 2 (7 MUDA)
      const btnUI1Muda = document.getElementById('speak-ui-btn-1muda'); const btnUI2Muda = document.getElementById('speak-ui-btn-2muda'); const btnUI3Muda = document.getElementById('speak-ui-btn-3muda'); const btnUI4Muda = document.getElementById('speak-ui-btn-4muda'); const btnUI5Muda = document.getElementById('speak-ui-btn-5muda'); const btnUI6Muda = document.getElementById('speak-ui-btn-6muda'); const btnUI7Muda = document.getElementById('speak-ui-btn-7muda');

      // UI Buttons Target 2 (7 VALUE)
      const btnUI1Value = document.getElementById('speak-ui-btn-1value'); const btnUI2Value = document.getElementById('speak-ui-btn-2value'); const btnUI3Value = document.getElementById('speak-ui-btn-3value'); const btnUI4Value = document.getElementById('speak-ui-btn-4value'); const btnUI5Value = document.getElementById('speak-ui-btn-5value'); const btnUI6Value = document.getElementById('speak-ui-btn-6value'); const btnUI7Value = document.getElementById('speak-ui-btn-7value');

      const allSpeakBtnUIsT1 = [btnUI1M, btnUI2M, btnUI3M, btnUI3_1M, btnUI3_2M, btnUI3_3M, btnUI1A, btnUI2A];
      const allSpeakBtnUIsT2 = [
        btnUI1Muda, btnUI2Muda, btnUI3Muda, btnUI4Muda, btnUI5Muda, btnUI6Muda, btnUI7Muda,
        btnUI1Value, btnUI2Value, btnUI3Value, btnUI4Value, btnUI5Value, btnUI6Value, btnUI7Value
      ];

      function updateIntroSubtitles() {
        if (!introAudio) return;
        const currentTime = introAudio.currentTime;
        let activeHtml = "";

        for (let i = 0; i < introSubtitlesData.length; i++) {
          if (currentTime >= introSubtitlesData[i].time) {
            activeHtml = introSubtitlesData[i].html;
          }
        }
        introSubtitles.innerHTML = activeHtml;
        if (!introAudio.paused) {
          requestAnimationFrame(updateIntroSubtitles);
        }
      }

      function selectInitialLanguage(lang) {
        setLanguage(lang);
        document.getElementById('lang-select-overlay').style.display = 'none';
        introOverlay.style.display = 'flex';

        window.speechSynthesis.cancel();
        introVideoElement.muted = true;

        let audioSrc = "";
        if (lang === 'th') {
          audioSrc = "./INTRO_TH.mp3";
          introSkipText.innerText = "แตะหน้าจอตรงไหนก็ได้เพื่อเข้าสู่ระบบ AR ✕";
          introSubtitlesData = [
            { time: 0.0, html: "ยินดีต้อนรับสู่ <b>AR SMART BOARD</b> สแกนบน BOARD แล้วมาร่วมสนุกกับการเรียนรู้ไปด้วยกัน 🎉" }
          ];
        } else if (lang === 'en') {
          audioSrc = "./INTRO_ENG.mp3";
          introSkipText.innerText = "Tap anywhere to enter the AR system ✕";
          introSubtitlesData = [
            { time: 0.0, html: "Welcome to <b>AR SMART BOARD</b>! Scan the board, and let’s explore the fun of learning together! 🎉" }
          ];
        } else if (lang === 'jp') {
          audioSrc = "./INTRO_JP.mp3";
          introSkipText.innerText = "画面のどこでもタップしてARシステムに入ります ✕";
          introSubtitlesData = [
            { time: 0.0, html: "<b>ARスマートボード</b>へようこそ！ボードをスキャンして、一緒に楽しく学びましょう！ 🎉" }
          ];
        }

        if (introAudio) {
          introAudio.pause();
          introAudio = null;
        }

        introAudio = new Audio(audioSrc);
        introVideoElement.currentTime = 0;
        
        let playVideoPromise = introVideoElement.play();
        let playAudioPromise = introAudio.play();

        if (playVideoPromise !== undefined) {
          playVideoPromise.catch(e => console.log("Video playback delayed/blocked:", e));
        }
        if (playAudioPromise !== undefined) {
          playAudioPromise.then(() => { requestAnimationFrame(updateIntroSubtitles); })
                           .catch(e => console.log("Audio playback delayed/blocked:", e));
        }
      }

      function closeIntroVideo() {
        if(introVideoElement) { introVideoElement.pause(); }
        if(introAudio) { introAudio.pause(); }
        introOverlay.style.display = 'none';
        document.querySelector('.ar-ui-layer').style.display = 'block';
      }

      function updateCameraBrightness(val) {
        const mindarVideo = document.querySelector('body > video');
        if (mindarVideo) {
          const brightnessPercent = 100 - val;
          mindarVideo.style.filter = `brightness(${brightnessPercent}%)`;
        }
      }

      function updateVoiceList() {
        if (!('speechSynthesis' in window)) return;
        allVoices = window.speechSynthesis.getVoices();
        voiceSelect.innerHTML = ''; 

        let filterLang = 'th-TH';
        if (currentLang === 'en') filterLang = 'en-'; 
        if (currentLang === 'jp') filterLang = 'ja-JP';
        if (currentLang === 'cn') filterLang = 'zh-';

        let filteredVoices = allVoices.filter(voice => 
          voice.lang.toLowerCase().replace('_', '-').startsWith(filterLang.toLowerCase())
        );

        filteredVoices.forEach((voice) => {
          const option = document.createElement('option');
          option.value = voice.name;
          let genderLabel = "หญิง"; 
          if (voice.name.includes('Male') || voice.name.includes('David') || voice.name.includes('Kangkang')) {
            genderLabel = "ชาย";
          }
          option.innerText = `เสียง${genderLabel} (${voice.name.split(' ')[0]})`;
          voiceSelect.appendChild(option);
        });

        if(filteredVoices.length === 0) {
          const option = document.createElement('option');
          option.innerText = "ใช้เสียงมาตรฐานเครื่อง";
          voiceSelect.appendChild(option);
        }
      }

      if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = updateVoiceList;
        updateVoiceList();
      }

      function getSelectedVoice() {
        const selectedName = voiceSelect.value;
        return allVoices.find(voice => voice.name === selectedName) || null;
      }

      function resetMediaUI() {
        window.speechSynthesis.cancel();
        subtitlesBox.style.display = "none";
        videoPlayer.pause();
        videoPlayer.src = "";
        videoContainer.style.display = "none";
        videoPlayBtn.innerText = "⏸"; 
        currentSpeechText = "";
      }

      function setLanguage(lang) {
        resetMediaUI(); 
        currentLang = lang;
        document.querySelectorAll('.flag-btn').forEach(btn => btn.classList.remove('active'));
        
        const flagBtn = document.getElementById(`flag-${lang}`);
        if(flagBtn) flagBtn.classList.add('active');
        
        updateVoiceList();
      }

      arTarget1.addEventListener("targetFound", () => {
        activeTargetIndex = 0;
        arContent1.setAttribute("visible", "true");
        allSpeakBtnUIsT1.forEach(btn => btn.style.display = "block");
      });

      arTarget1.addEventListener("targetLost", () => {
        if (!isFrozen) {
          arContent1.setAttribute("visible", "false");
          allSpeakBtnUIsT1.forEach(btn => btn.style.display = "none");
          resetMediaUI(); 
          if(activeTargetIndex === 0) activeTargetIndex = -1;
        }
      });

      arTarget2.addEventListener("targetFound", () => {
        activeTargetIndex = 1;
        arContent2.setAttribute("visible", "true");
        allSpeakBtnUIsT2.forEach(btn => btn.style.display = "block");
      });

      arTarget2.addEventListener("targetLost", () => {
        if (!isFrozen) {
          arContent2.setAttribute("visible", "false");
          allSpeakBtnUIsT2.forEach(btn => btn.style.display = "none");
          resetMediaUI();
          if(activeTargetIndex === 1) activeTargetIndex = -1;
        }
      });

      const tempV = new THREE.Vector3();
      function positionButton(entity, button, offsetX, offsetY) {
        if (entity && entity.object3D && cameraEl.components.camera) {
          entity.object3D.getWorldPosition(tempV);
          tempV.project(cameraEl.components.camera.camera);
          const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
          const y = (tempV.y * -0.5 + 0.5) * window.innerHeight;
          button.style.left = `${x + offsetX}px`; 
          button.style.top = `${y + offsetY}px`; 
        }
      }

      function updateAllButtonPositions() {
        if (cameraEl) {
          if (activeTargetIndex === 0 || (isFrozen && activeTargetIndex === 0)) {
            positionButton(ent1M, btnUI1M, 70, -1);
            positionButton(ent2M, btnUI2M, 65, -1);
            positionButton(ent3M, btnUI3M, 80, 0); 
            positionButton(ent3_1M, btnUI3_1M, 90, -2);
            positionButton(ent3_2M, btnUI3_2M, 75, -2);
            positionButton(ent3_3M, btnUI3_3M, 70, -2);
            positionButton(ent1A, btnUI1A, 75, -2);
            positionButton(ent2A, btnUI2A, 75, -2);
          } else if (activeTargetIndex === 1 || (isFrozen && activeTargetIndex === 1)) {
            positionButton(entMuda1, btnUI1Muda, 75, -2);
            positionButton(entMuda2, btnUI2Muda, 75, -2);
            positionButton(entMuda3, btnUI3Muda, 75, -2);
            positionButton(entMuda4, btnUI4Muda, 75, -2);
            positionButton(entMuda5, btnUI5Muda, 75, -2);
            positionButton(entMuda6, btnUI6Muda, 75, -2);
            positionButton(entMuda7, btnUI7Muda, 75, -2);

            positionButton(entValue1, btnUI1Value, 75, -2);
            positionButton(entValue2, btnUI2Value, 75, -2);
            positionButton(entValue3, btnUI3Value, 75, -2);
            positionButton(entValue4, btnUI4Value, 75, -2);
            positionButton(entValue5, btnUI5Value, 75, -2);
            positionButton(entValue6, btnUI6Value, 75, -2);
            positionButton(entValue7, btnUI7Value, 75, -2);
          }
        }
        requestAnimationFrame(updateAllButtonPositions);
      }
      requestAnimationFrame(updateAllButtonPositions);

      function toggleFreeze() {
        const mindarSystem = sceneEl.systems["mindar-image-system"];
        isFrozen = !isFrozen;
        if (isFrozen) {
          if (mindarSystem) mindarSystem.pause(true); 
          freezeBtn.innerText = "🔄 ปล่อยภาพตามกล้อง";
          freezeBtn.classList.add("active");
        } else {
          arContent1.setAttribute("visible", "false");
          arContent2.setAttribute("visible", "false");
          allSpeakBtnUIsT1.forEach(btn => btn.style.display = "none");
          allSpeakBtnUIsT2.forEach(btn => btn.style.display = "none");
          resetMediaUI(); 
          activeTargetIndex = -1;
          
          if (mindarSystem) {
            mindarSystem.unpause();
            if (mindarSystem.imageTargeters && mindarSystem.imageTargeters[0]) {
              mindarSystem.activeTargetIndex = -1;
            }
          }
          freezeBtn.innerText = "📌 ล็อกภาพให้ค้างหน้าจอ";
          freezeBtn.classList.remove("active");
        }
      }

      function toggleVideoPlay() {
        if (videoPlayer.paused) {
          if (videoPlayer.currentTime === 0) {
            triggerSpeechSynthesis(currentSpeechText, currentSpeechLang);
          } else {
            if (window.speechSynthesis.speaking && window.speechSynthesis.paused) {
              window.speechSynthesis.resume();
            }
          }
          
          // บังคับและตรวจสอบระบบเสียงคลิปทุกครั้งที่กด Play ป้องกันเสียงแทรก
          if (currentLang === 'th') {
            videoPlayer.muted = false;
          } else {
            videoPlayer.muted = true;
          }

          videoPlayer.play().catch(e => console.log(e));
          videoPlayBtn.innerText = "⏸";
        } else {
          videoPlayer.pause();
          videoPlayBtn.innerText = "▶";
          if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
            window.speechSynthesis.pause();
          }
        }
      }

      function seekVideo(val) {
        if (videoPlayer.duration) {
          const seekTo = (val / 100) * videoPlayer.duration;
          videoPlayer.currentTime = seekTo;
          window.speechSynthesis.cancel();
          
          // ล็อกระบบ Mute ไว้เสมอเมื่อมีการขยับ Timeline
          if (currentLang === 'th') {
            videoPlayer.muted = false;
          } else {
            videoPlayer.muted = true;
          }

          if (seekTo === 0 && !videoPlayer.paused) {
            triggerSpeechSynthesis(currentSpeechText, currentSpeechLang);
          } else if (seekTo === 0 && videoPlayer.paused) {
            videoPlayBtn.innerText = "▶";
          }
        }
      }

      function triggerSpeechSynthesis(text, lang) {
        window.speechSynthesis.cancel(); 
        if (!text) return;
        const utterance = new SpeechSynthesisUtterance();
        utterance.text = text;
        utterance.lang = lang;
        utterance.rate = parseFloat(speedSelect.value);
        utterance.voice = getSelectedVoice();
        setTimeout(() => { window.speechSynthesis.speak(utterance); }, 50);
      }

      function closeVideoUI() { resetMediaUI(); }

      videoPlayer.addEventListener('timeupdate', () => {
        if (videoPlayer.duration) {
          const percentage = (videoPlayer.currentTime / videoPlayer.duration) * 100;
          videoTimeline.value = percentage;
          const mins = Math.floor(videoPlayer.currentTime / 60);
          const secs = Math.floor(videoPlayer.currentTime % 60);
          videoTimeText.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }
      });

      function performSpeakAction(textMap, htmlMap, videoSrc) {
        window.speechSynthesis.cancel(); 
        if (currentLang === 'th') {
          currentSpeechText = textMap.th; currentSpeechLang = "th-TH"; subtitlesBox.innerHTML = htmlMap.th;
        } else if (currentLang === 'en') {
          currentSpeechText = textMap.en || textMap.th; currentSpeechLang = "en-US"; subtitlesBox.innerHTML = htmlMap.en || htmlMap.th;
        } else if (currentLang === 'jp') {
          currentSpeechText = textMap.jp || textMap.th; currentSpeechLang = "ja-JP"; subtitlesBox.innerHTML = htmlMap.jp || htmlMap.th;
        } else if (currentLang === 'cn') {

          if (currentLang === 'th') {

          }

          videoPlayer.play()
            .then(() => { triggerSpeechSynthesis(currentSpeechText, currentSpeechLang); })
