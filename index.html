<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>AR สื่อการสอน: ต้นทุนโรงงาน</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      .ar-ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999999;
        pointer-events: none;
      }

      /* ปุ่มเปิดสิทธิ์เสียง (สร้างขึ้นมาเพื่อแก้ปัญหา iOS/Android บล็อกเสียงอัตโนมัติ) */
      #audio-enable-btn {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: auto;
        padding: 12px 20px;
        background-color: #FF6B35;
        color: white;
        border: 2px solid white;
        border-radius: 30px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 14px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
        cursor: pointer;
        z-index: 1000000;
      }

      #freeze-btn {
        position: absolute;
        bottom: 30px;
        right: 20px;
        pointer-events: auto;
        padding: 14px 24px;
        background-color: #004E98;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 16px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        cursor: pointer;
        -webkit-appearance: none;
      }
      #freeze-btn.active { background-color: #FF6B35; }
      .mindar-ui-scanning { background: none !important; }
    </style>
  </head>

  <body>
    <div class="ar-ui-layer">
      <button id="audio-enable-btn" onclick="initAudio()">🔊 แตะตรงนี้ก่อนเริ่มใช้งานเพื่อเปิดระบบเสียง</button>
      <button id="freeze-btn" onclick="toggleFreeze()">📌 ล็อกภาพให้ค้างหน้าจอ</button>
    </div>

    <audio id="ingotSound" src="./sound.mp3" preload="auto"></audio>

    <a-scene id="scene" mindar-image="imageTargetSrc: ./What_is_cost.mind; uiScanning: yes; filterMinCF: 0.0001; filterBeta: 0.001;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" raycaster="objects: .clickable; far: 100;" cursor="fuse: false; rayOrigin: mouse">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-entity id="ar-content" visible="false">
          
          <a-image src="./Manu_Cost_sign.png" position="-0.28 0.16 0" scale="0.45 0.039 1"></a-image>
          <a-image src="./Admin_Cost_sign.png" position="0.22 0.16 0" scale="0.45 0.039 1"></a-image>

          <a-image src="./1M.png" position="-0.42 0.12 0" scale="0.18 0.05 1"></a-image> 
          
          <a-image id="speaker-btn" class="clickable" src="./1.M_SPK.png" position="-0.20 0.12 0.02" scale="0.08 0.08 1" onclick="playMp3Sound()"></a-image>
          
          <a-image src="./ingot.png" position="-0.38 0.04 0" scale="0.09 0.07 1"></a-image> 
        
          <a-image src="./2M.png" position="-0.42 -0.02 0" scale="0.18 0.06 1"></a-image>
          <a-image src="./Direct_Labor.png" position="-0.40 -0.12 0" scale="0.17 0.11 1"></a-image>
          
          <a-image src="./Office.png" position="0.28 0.01 0" scale="0.09 0.09 1"></a-image>

        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      let isFrozen = false;
      const sceneEl = document.getElementById('scene');
      const freezeBtn = document.getElementById('freeze-btn');
      const arTarget = document.getElementById('ar-target');
      const arContent = document.getElementById('ar-content');
      const audioBtn = document.getElementById('audio-enable-btn');
      const soundTrack = document.getElementById('ingotSound');

      // ฟังก์ชันปลดล็อก Audio Context เมื่อกดปุ่มส้มด้านบน
      function initAudio() {
        soundTrack.play().then(() => {
          soundTrack.pause(); // สั่งเล่นแล้วหยุดทันทีเพื่อปลดล็อกสิทธิ์
          soundTrack.currentTime = 0;
          audioBtn.style.display = 'none'; // ซ่อนปุ่มเมื่อเปิดสิทธิ์สำเร็จ
        }).catch(err => {
          console.log("Audio unlock failed:", err);
          audioBtn.innerText = "❌ ลองแตะอีกครั้งเพื่อเปิดเสียง";
        });
      }

      // ฟังก์ชันเล่นเสียงเมื่อกดที่ตัวลำโพง AR
      function playMp3Sound() {
        if(soundTrack) {
          soundTrack.currentTime = 0; // เล่นใหม่ตั้งแต่ต้นทุกครั้งที่กด
          soundTrack.play().catch(e => {
            // ถ้าเบราว์เซอร์ยังบล็อกอยู่ ให้แจ้งเตือนผู้ใช้กดปุ่มเปิดสิทธิ์อีกที
            alert("กรุณากดปุ่ม 'เปิดระบบเสียง' สีส้มด้านบนก่อนครับ");
          });
        }
      }

      arTarget.addEventListener("targetFound", () => {
        arContent.setAttribute("visible", "true");
      });

      arTarget.addEventListener("targetLost", () => {
        if (!isFrozen) {
          arContent.setAttribute("visible", "false");
        }
      });

      function toggleFreeze() {
        isFrozen = !isFrozen;
        const mindarSystem = sceneEl.systems["mindar-image-system"];
        
        if (isFrozen) {
          if (mindarSystem) mindarSystem.pause(true); 
          freezeBtn.innerText = "🔄 ปล่อยภาพตามกล้อง";
          freezeBtn.classList.add("active");
        } else {
          arContent.setAttribute("visible", "false");
          
          if (mindarSystem) {
            mindarSystem.unpause();
            if (mindarSystem.imageTargeters && mindarSystem.imageTargeters[0]) {
              mindarSystem.activeTargetIndex = -1; 
            }
          }
          
          freezeBtn.innerText = "📌 ล็อกภาพให้ค้างหน้าจอ";
          freezeBtn.classList.remove("active");
        }
      }
    </script>
  </body>
</html>
