<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>AR สื่อการสอน: ต้นทุนโรงงาน</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      .ar-ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999999;
        pointer-events: none;
      }

      /* แผงปุ่มเมนูด้านบนสำหรับสลับโหมดสแกน */
      .menu-container {
        position: absolute;
        top: 15px;
        left: 15px;
        display: flex;
        gap: 10px;
        pointer-events: auto;
      }

      .menu-btn {
        padding: 10px 16px;
        border: none;
        border-radius: 6px;
        font-family: sans-serif;
        font-weight: bold;
        font-size: 14px;
        background-color: #E0E0E0;
        color: #333;
        cursor: pointer;
        box-shadow: 0px 4px 6px rgba(0,0,0,0.3);
      }

      .menu-btn.active {
        background-color: #004E98;
        color: white;
      }

      #freeze-btn {
        position: absolute;
        bottom: 30px; /* ย้ายมาไว้ด้านล่างเพื่อไม่ให้บังเมนู */
        right: 20px;
        pointer-events: auto;
        padding: 14px 24px;
        background-color: #2F3E46;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 16px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        cursor: pointer;
      }
      #freeze-btn.active { background-color: #FF6B35; }
      .mindar-ui-scanning { background: none !important; }
    </style>
  </head>

  <body>
    <div class="ar-ui-layer">
      <div class="menu-container">
        <button id="btn-dm" class="menu-btn active" onclick="switchMode('dm')">📦 1. วัตถุดิบทางตรง</button>
        <button id="btn-dl" class="menu-btn" onclick="switchMode('dl')">👷 2. ค่าแรงทางตรง</button>
      </div>
      
      <button id="freeze-btn" onclick="toggleFreeze()">📌 ล็อกภาพค้างหน้าจอ</button>
    </div>

    <a-scene id="scene" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" raycaster="objects: .clickable; far: 100; interval: 100" cursor="fuse: false; rayOrigin: mouse">
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="scene-dm" mindar-image="imageTargetSrc: ./1_Direct_Materials.mind; uiScanning: yes;">
        <a-entity id="target-dm" mindar-image-target="targetIndex: 0">
          <a-entity id="content-dm">
            <a-image src="./Ingot.png" position="0 0.05 0" scale="0.35 0.25 1"></a-image>
            <a-text value="1. Direct Materials" position="0 -0.12 0" scale="0.45 0.45 0.45" color="#FF6B35" align="center"></a-text>
            <a-plane class="clickable" position="0 0 0.02" width="0.45" height="0.45" material="opacity: 0.0; transparent: true" onclick="speakIngot()"></a-plane>
          </a-entity>
        </a-entity>
      </a-entity>

      <a-entity id="scene-dl" mindar-image="imageTargetSrc: ./2_Direct_Labor.mind; uiScanning: no;" visible="false">
        <a-entity id="target-dl" mindar-image-target="targetIndex: 0">
          <a-entity id="content-dl">
            <a-image src="./Labor.png" position="0 0.05 0" scale="0.35 0.25 1"></a-image>
            <a-text value="2. Direct Labor" position="0 -0.12 0" scale="0.45 0.45 0.45" color="#004E98" align="center"></a-text>
            <a-plane class="clickable" position="0 0 0.02" width="0.45" height="0.45" material="opacity: 0.0; transparent: true" onclick="speakLabor()"></a-plane>
          </a-entity>
        </a-entity>
      </a-entity>

    </a-scene>

    <script>
      let isFrozen = false;
      let currentMode = 'dm';
      const sceneEl = document.getElementById('scene');
      const freezeBtn = document.getElementById('freeze-btn');

      // จัดการ Event การสแกนแยกกลุ่ม
      document.getElementById('target-dm').addEventListener("targetFound", () => document.getElementById('content-dm').setAttribute("visible", "true"));
      document.getElementById('target-dm').addEventListener("targetLost", () => { if (!isFrozen) document.getElementById('content-dm').setAttribute("visible", "false"); });

      document.getElementById('target-dl').addEventListener("targetFound", () => document.getElementById('content-dl').setAttribute("visible", "true"));
      document.getElementById('target-dl').addEventListener("targetLost", () => { if (!isFrozen) document.getElementById('content-dl').setAttribute("visible", "false"); });

      // ฟังก์ชันหัวใจหลัก: สลับไฟล์ .mind โดยไม่ต้องปิดกล้อง
      function switchMode(mode) {
        if (mode === currentMode) return;
        window.speechSynthesis.cancel();
        
        // รีเซ็ตสถานะแช่แข็งภาพก่อนสลับ
        if (isFrozen) toggleFreeze();

        const dmSystem = document.getElementById('scene-dm');
        const dlSystem = document.getElementById('scene-dl');
        const btnDm = document.getElementById('btn-dm');
        const btnDl = document.getElementById('btn-dl');

        if (mode === 'dm') {
          // เปิดระบบ DM / ปิดระบบ DL
          dlSystem.setAttribute("visible", "false");
          dlSystem.setAttribute("mindar-image", "imageTargetSrc: ./2_Direct_Labor.mind; uiScanning: no;");
          
          dmSystem.setAttribute("visible", "true");
          dmSystem.setAttribute("mindar-image", "imageTargetSrc: ./1_Direct_Materials.mind; uiScanning: yes;");
          
          btnDm.classList.add('active');
          btnDl.classList.remove('active');
          currentMode = 'dm';
        } else {
          // เปิดระบบ DL / ปิดระบบ DM
          dmSystem.setAttribute("visible", "false");
          dmSystem.setAttribute("mindar-image", "imageTargetSrc: ./1_Direct_Materials.mind; uiScanning: no;");
          
          dlSystem.setAttribute("visible", "true");
          dlSystem.setAttribute("mindar-image", "imageTargetSrc: ./2_Direct_Labor.mind; uiScanning: yes;");
          
          btnDl.classList.add('active');
          btnDm.classList.remove('active');
          currentMode = 'dl';
        }
      }

      function toggleFreeze() {
        isFrozen = !isFrozen;
        const activeSystemId = currentMode === 'dm' ? "scene-dm" : "scene-dl";
        const mindarSystem = document.getElementById(activeSystemId).systems["mindar-image-system"];
        
        if (isFrozen) {
          if (mindarSystem) mindarSystem.pause(true);
          freezeBtn.innerText = "🔄 ปล่อยภาพตามกล้อง";
          freezeBtn.classList.add("active");
        } else {
          document.getElementById('content-dm').setAttribute("visible", "false");
          document.getElementById('content-dl').setAttribute("visible", "false");
          if (mindarSystem) mindarSystem.unpause();
          freezeBtn.innerText = "📌 ล็อกภาพค้างหน้าจอ";
          freezeBtn.classList.remove("active");
        }
      }

      function speakIngot() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("วัตถุดิบทางตรง Direct Materials วัตถุดิบหลักที่ใช้ในการผลิต เช่น อลูมิเนียม");
        utterance.lang = "th-TH"; utterance.rate = 0.95; window.speechSynthesis.speak(utterance);
      }

      function speakLabor() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("ค่าแรงงานทางตรง Direct Labor ค่าแรงของพนักงานที่มีหน้าที่ในการผลิตสินค้าโดยตรง เช่น พนักงานฝ่ายผลิต");
        utterance.lang = "th-TH"; utterance.rate = 0.95; window.speechSynthesis.speak(utterance);
      }
    </script>
  </body>
</html>
