<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AR สื่อการสอน: ต้นทุนโรงงาน</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>

  <body>
    <a-scene mindar-image="imageTargetSrc: ./targets.mind;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-space>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-text value="FACTORY COSTS" position="0 0.5 0" color="#FFD700" align="center" width="4"></a-text>

        <a-box position="-0.4 0 0" scale="0.2 0.4 0.2" material="color: #FF6B35;"></a-box>
        <a-text value="1. Materials" position="-0.4 0.3 0" scale="0.6 0.6 0.6" color="#FF6B35" align="center"></a-text>

        <a-box position="0 0 0" scale="0.2 0.4 0.2" material="color: #004E98;"></a-box>
        <a-text value="2. Labor" position="0 0.3 0" scale="0.6 0.6 0.6" color="#004E98" align="center"></a-text>

        <a-box position="0.4 0 0" scale="0.2 0.4 0.2" material="color: #06D6A0;"></a-box>
        <a-text value="3. Overhead" position="0.4 0.3 0" scale="0.5 0.5 0.5" color="#06D6A0" align="center"></a-text>

      </a-entity>
    </a-scene>
  </body>
</html>
