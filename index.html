<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title> TBKK ตระหนักรู้ เรื่องต้นทุน </title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      .ar-ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999999;
        pointer-events: none;
      }

      .top-left-logo {
        position: absolute;
        top: 20px;
        left: 20px;
        pointer-events: auto; 
        max-width: 120px;      
        height: auto;
        filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.4)); 
        z-index: 1000002;
      }

      .lang-container {
        position: absolute;
        top: 20px;
        right: 20px;
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
        background-color: rgba(0, 0, 0, 0.75);
        padding: 12px 18px;
        border-radius: 16px;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.4);
      }

      .flags-row {
        display: flex;
        gap: 10px;
        margin-bottom: 4px;
      }

      .flag-btn {
        width: 35px;
        height: 25px;
        cursor: pointer;
        border-radius: 4px;
        border: 2px solid transparent;
        transition: all 0.2s ease;
        object-fit: cover;
      }
      .flag-btn.active {
        border-color: #FF6B35;
        transform: scale(1.1);
      }

      .control-group {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 170px;
        color: white;
        font-size: 12px;
        font-family: sans-serif;
      }

      .control-group select {
        width: 115px;
        padding: 4px;
        font-size: 11px;
        border-radius: 4px;
        border: 1px solid #ccc;
        background-color: white;
        color: #333;
        outline: none;
      }

      .control-group input[type="range"] {
        width: 115px;
        -webkit-appearance: none;
        background: #ddd;
        height: 6px;
        border-radius: 3px;
        outline: none;
      }

      .control-group input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #FF6B35;
        cursor: pointer;
        transition: transform 0.1s;
      }

      .control-group input[type="range"]::-webkit-slider-thumb:active {
        transform: scale(1.2);
      }

      #video-overlay-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 92%;              
        max-width: 600px;        
        display: none; 
        z-index: 1000000;
        pointer-events: auto; 
      }

      .video-wrapper {
        position: relative;
        width: 100%;
        background-color: #000000;
        border: 3px solid white;
        border-radius: 12px;
        box-shadow: 0px 10px 25px rgba(0,0,0,0.6);
        overflow: hidden;
      }

      #ar-video-player {
        width: 100%;
        display: block;
      }

      .video-controls {
        display: flex;
        align-items: center;
        background-color: rgba(0, 0, 0, 0.85);
        padding: 8px 12px;
        gap: 10px;
      }

      .video-btn {
        background: none;
        border: none;
        color: white;
        font-size: 16px;
        cursor: pointer;
        outline: none;
        padding: 0 5px;
      }

      .video-timeline {
        flex-grow: 1;
        -webkit-appearance: none;
        background: #555;
        height: 6px;
        border-radius: 3px;
        outline: none;
        cursor: pointer;
      }

      .video-timeline::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #0077B6;
        cursor: pointer;
      }

      .video-time-text {
        color: white;
        font-family: sans-serif;
        font-size: 11px;
        min-width: 35px;
        text-align: center;
      }

      .video-close-top-btn {
        position: absolute;
        top: -45px; 
        right: 0px;    
        background-color: rgba(0, 0, 0, 0.7);
        color: #FF6B35;
        border: 2px solid white;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
        outline: none;
        transition: transform 0.1s ease;
        -webkit-appearance: none;
      }
      .video-close-top-btn:active {
        transform: scale(0.9);
      }

      #subtitles-box {
        position: relative; 
        margin-top: 12px;   
        width: 100%;        
        box-sizing: border-box;
        background-color: rgba(20, 20, 20, 0.9);
        color: #FFFFFF;
        padding: 16px;
        border-radius: 12px;
        font-family: sans-serif;
        box-shadow: 0px 8px 20px rgba(0,0,0,0.6);
        display: none;
        pointer-events: none;
        text-align: left;
      }

      .sub-title-badge {
        display: inline-block;
        background-color: #FF6B35;
        color: white;
        padding: 4px 12px;
        border-radius: 6px;
        font-size: 15px;
        font-weight: bold;
        margin-bottom: 10px;
        letter-spacing: 0.5px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      }

      .sub-title-badge.value-badge {
        background-color: #2A9D8F;
      }

      .sub-description-text {
        font-size: 14px;
        line-height: 1.6;
        color: #E0E0E0;
        font-weight: normal;
        display: block;
      }

      .speak-btn-ui {
        position: absolute;
        pointer-events: auto;
        padding: 6px 12px;
        background-color: #0077B6;
        color: white;
        border: 2px solid white;
        border-radius: 6px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 13px;
        box-shadow: 0px 4px 8px rgba(0,0,0,0.4);
        cursor: pointer;
        display: none;
        transform: translate(-50%, -50%);
        z-index: 100000;
        -webkit-appearance: none;
        white-space: nowrap;
      }
      .speak-btn-ui:active { background-color: #0096C7; }

      #freeze-btn {
        position: absolute;
        bottom: 30px;
        right: 20px;
        pointer-events: auto;
        padding: 14px 24px;
        background-color: #004E98;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 16px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        cursor: pointer;
        -webkit-appearance: none;
        z-index: 100001;
      }
      #freeze-btn.active { background-color: #FF6B35; }
      .mindar-ui-scanning { background: none !important; }
    </style>
  </head>

    <script>
      let isFrozen = false;

      // UI Buttons Target 1

      function updateVoiceList() {
        if (!('speechSynthesis' in window)) return;
        allVoices = window.speechSynthesis.getVoices();
        voiceSelect.innerHTML = ''; 

        let filterLang = 'th-TH';
        if (currentLang === 'en') filterLang = 'en-'; 
        if (currentLang === 'jp') filterLang = 'ja-JP';
        if (currentLang === 'cn') filterLang = 'zh-';

        let filteredVoices = allVoices.filter(voice => 
          voice.lang.toLowerCase().replace('_', '-').startsWith(filterLang.toLowerCase())
        );

        filteredVoices.forEach((voice) => {
          const option = document.createElement('option');
          option.value = voice.name;
          let genderLabel = "หญิง"; 
          if (voice.name.includes('Male') || voice.name.includes('David') || voice.name.includes('Kangkang')) {
            genderLabel = "ชาย";
          }
          option.innerText = `เสียง${genderLabel} (${voice.name.split(' ')[0]})`;
          voiceSelect.appendChild(option);
        });

        if(filteredVoices.length === 0) {
          const option = document.createElement('option');
          option.innerText = "ใช้เสียงมาตรฐานเครื่อง";
          voiceSelect.appendChild(option);
        }
      }

      if ('speechSynthesis' in window) {

      function getSelectedVoice() {

      // ปรับปรุงฟังก์ชันควบคุมปุ่ม Play/Pause วิดีโอและเสียงพากย์ตามเงื่อนไขใหม่
      function toggleVideoPlay() {
        if (videoPlayer.paused) {
          // เงื่อนไข: ถ้าเล่นจากจุดเริ่มต้น (0 วินาที) ให้สั่งพากย์เสียงใหม่ตั้งแต่ต้นเสมอ
          if (videoPlayer.currentTime === 0) {
            triggerSpeechSynthesis(currentSpeechText, currentSpeechLang);
          } else {
            // ถ้าเป็นการกด Play ต่อจากการ Pause กลางคัน ให้ดึงเสียงเดิมมาพูดต่อ (Resume)
            if (window.speechSynthesis.speaking && window.speechSynthesis.paused) {
              window.speechSynthesis.resume();
            }
          }
          videoPlayer.play().catch(e => console.log(e));
          videoPlayBtn.innerText = "⏸";
        } else {
          videoPlayer.pause();
          videoPlayBtn.innerText = "▶";
          // ถ้าสั่งหยุดวิดีโอ ให้สั่งหยุดพักเสียงพากย์ด้วยชั่วคราว
          if (window.speechSynthesis.speaking && !window.speechSynthesis.paused) {
            window.speechSynthesis.pause();
          }
        }
      }

      // ปรับปรุงฟังก์ชันการกรอวิดีโอ
      function seekVideo(val) {
        if (videoPlayer.duration) {
          const seekTo = (val / 100) * videoPlayer.duration;
          videoPlayer.currentTime = seekTo;
          
          // สั่งล้างคิวเสียงเก่าออกทันทีก่อนเมื่อทำการลากสไลเดอร์กรอเวลา
          window.speechSynthesis.cancel();
          
          // เงื่อนไข: ถ้ากรอกลับมาที่จุดเริ่มต้น (0 วินาที) และวิดีโอกำลังเปิดเล่นอยู่ ให้เริ่มพากย์คำแรกใหม่ทันที
          if (seekTo === 0 && !videoPlayer.paused) {
            triggerSpeechSynthesis(currentSpeechText, currentSpeechLang);
          } else if (seekTo === 0 && videoPlayer.paused) {
            // หากกรอมาจุดเริ่มต้นแต่สถานะวิดีโอถูกหยุดอยู่ จะยังไม่พูด จนกว่าจะกดปุ่มเล่น (ตามเงื่อนไขที่ 2)
            videoPlayBtn.innerText = "▶";
          }
        }
      }

      // ฟังก์ชันสำหรับสั่งให้ Web Speech API ทำการสร้างเสียงพากย์และพูด
      function triggerSpeechSynthesis(text, lang) {
        window.speechSynthesis.cancel(); // ล้างคิวค้างทั้งหมดก่อนเริ่มใหม่
        if (!text) return;

        const utterance = new SpeechSynthesisUtterance();
        utterance.text = text;
        utterance.lang = lang;
        utterance.rate = parseFloat(speedSelect.value);
        utterance.voice = getSelectedVoice();

        // หน่วงเวลาเซ็ตติ้ง 50ms ป้องกันเบราว์เซอร์กระตุกหรือคิวล็อก
        setTimeout(() => {
          window.speechSynthesis.speak(utterance);
        }, 50);
      }

          videoTimeText.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
        }

        window.speechSynthesis.cancel(); // ตัดงานเสียงเดิมทิ้งทั้งหมดทันที

        } else if (currentLang === 'en') {
          currentSpeechText = textMap.en || textMap.th;
          currentSpeechLang = "en-US"; 
          subtitlesBox.innerHTML = htmlMap.en || htmlMap.th;
        } else if (currentLang === 'jp') {
          currentSpeechText = textMap.jp || textMap.th;
          currentSpeechLang = "ja-JP"; 
          subtitlesBox.innerHTML = htmlMap.jp || htmlMap.th;
        } else if (currentLang === 'cn') {
          currentSpeechText = textMap.cn || textMap.th;
          currentSpeechLang = "zh-CN"; 
          subtitlesBox.innerHTML = htmlMap.cn || htmlMap.th;
        }
        
        subtitlesBox.style.display = "block";
        
        if(videoSrc) {
          videoPlayer.src = videoSrc;
          videoContainer.style.display = "block";
          videoPlayer.currentTime = 0; // บังคับกรอวิดีโอไปจุดเริ่มต้นเสมอก่อนเริ่มเล่น
          videoPlayBtn.innerText = "⏸";
          
          // เล่นวิดีโอ และเมื่อเล่นจาก 0 ระบบจะดักฟังก์ชันไปสั่งเปิดเสียงพากย์เวอร์ชันเริ่มใหม่โดยอัตโนมัติ
          videoPlayer.play()
            .then(() => {
              triggerSpeechSynthesis(currentSpeechText, currentSpeechLang);
            })
            .catch(e => console.log("Video auto-play blocked:", e));
        }
      }
