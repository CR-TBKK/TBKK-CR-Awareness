<!DOCTYPE html>
<html>
  <head>
    <title>MR.CR Paperless AR</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        
        <a-text value="MR.CR PAPERLESS" position="0 2 0" color="#FFD700" align="center" width="6"></a-text>

        <a-box position="-1.5 0.5 0" scale="0.8 0.5 0.2" material="color: #FF5733;">
          <a-text value="1. REDUCE PRINT" position="0 0 0.6" align="center" width="3" color="#FFF"></a-text>
        </a-box>

        <a-box position="0 0.5 0" scale="0.8 0.5 0.2" material="color: #33FF57;">
          <a-text value="2. REDUCE USE" position="0 0 0.6" align="center" width="3" color="#000"></a-text>
        </a-box>

        <a-box position="1.5 0.5 0" scale="0.8 0.5 0.2" material="color: #3357FF;">
          <a-text value="3. REDUCE KEEP" position="0 0 0.6" align="center" width="3" color="#FFF"></a-text>
        </a-box>

        <a-text value="Cost reduction is profit creation!" position="0 -0.5 0" color="#FFF" align="center" width="4"></a-text>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
