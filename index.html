<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>AR สื่อการสอน: ต้นทุนโรงงาน</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      /* จัดการให้ฉากกล้อง AR อยู่ด้านหลัง */
      a-scene {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
      }

      /* บังคับให้ปุ่มล็อกภาพลอยขึ้นมาอยู่บนสุดเหนือจอกล้อง (z-index: 9999) */
      #freeze-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
        padding: 14px 28px;
        background-color: #004E98;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 16px;
        cursor: pointer;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        -webkit-appearance: none; /* ป้องกันหน้าจอเบราว์เซอร์มือถือบางรุ่นปรับแต่งปุ่มเอง */
      }
      
      #freeze-btn.active {
        background-color: #FF6B35;
      }

      .mindar-ui-scanning { background: none !important; z-index: 2; }
    </style>
  </head>

  <body>
    <button id="freeze-btn" onclick="toggleFreeze()">📌 ล็อกภาพให้อยู่กับที่</button>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiScanning: yes;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        
        <a-text value="FACTORY COSTS" position="0 0.5 0" rotation="0 0 0" color="#FFD700" align="center" width="4" font="mozillavr"></a-text>

        <a-image 
          src="./Ingot.png" 
          position="-0.4 0 0" 
          rotation="0 0 0"
          scale="0.35 0.25 1">
        </a-image>
        <a-text value="1. Direct Materials" position="-0.4 -0.2 0" rotation="0 0 0" scale="0.35 0.35 0.35" color="#FF6B35" align="center"></a-text>

        <a-image 
          src="./Labor.png" 
          position="0 0 0" 
          rotation="0 0 0"
          scale="0.35 0.25 1">
        </a-image>
        <a-text value="2. Direct Labor" position="0 -0.2 0" rotation="0 0 0" scale="0.35 0.35 0.35" color="#004E98" align="center"></a-text>

        <a-image 
          src="./Overhead.png" 
          position="0.4 0 0" 
          rotation="0 0 0"
          scale="0.35 0.25 1">
        </a-image>
        <a-text value="3. Overhead" position="0.4 -0.2 0" rotation="0 0 0" scale="0.35 0.35 0.35" color="#06D6A0" align="center"></a-text>

      </a-entity>
    </a-scene>

    <script>
      let isFrozen = false;
      const targetEntity = document.getElementById('ar-target');
      const btn = document.getElementById('freeze-btn');

      function toggleFreeze() {
        isFrozen = !isFrozen;
        if (isFrozen) {
          // สั่งตัดการเชื่อมต่อกล้อง เพื่อล็อกตำแหน่งวัตถุให้อยู่คาหน้าจอ
          targetEntity.setAttribute("mindar-image-target", "targetIndex: -1");
          btn.innerText = "🔄 ปล่อยภาพตามกล้อง";
          btn.classList.add("active");
        } else {
          // เปิดให้อ่านค่าจากกล้องตามปกติ
          targetEntity.setAttribute("mindar-image-target", "targetIndex: 0");
          btn.innerText = "📌 ล็อกภาพให้อยู่กับที่";
          btn.classList.remove("active");
        }
      }
    </script>
  </body>
</html>
