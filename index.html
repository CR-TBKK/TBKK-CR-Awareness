<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title> TBKK ตระหนักรู้ เรื่องต้นทุน </title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      .ar-ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999999;
        pointer-events: none;
      }

      .top-left-logo {
        position: absolute;
        top: 20px;
        left: 20px;
        pointer-events: auto; 
        max-width: 120px;      
        height: auto;
        filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.4)); 
        z-index: 1000002;
      }

      .lang-container {
        position: absolute;
        top: 20px;
        right: 20px;
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
        background-color: rgba(0, 0, 0, 0.75);
        padding: 12px 18px;
        border-radius: 16px;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.4);
      }

      .flags-row {
        display: flex;
        gap: 10px;
        margin-bottom: 4px;
      }

      .flag-btn {
        width: 35px;
        height: 25px;
        cursor: pointer;
        border-radius: 4px;
        border: 2px solid transparent;
        transition: all 0.2s ease;
        object-fit: cover;
      }
      .flag-btn.active {
        border-color: #FF6B35;
        transform: scale(1.1);
      }

      .control-group {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 170px;
        color: white;
        font-size: 12px;
        font-family: sans-serif;
      }

      .control-group select {
        width: 115px;
        padding: 4px;
        font-size: 11px;
        border-radius: 4px;
        border: 1px solid #ccc;
        background-color: white;
        color: #333;
        outline: none;
      }

      .control-group input[type="range"] {
        width: 115px;
        -webkit-appearance: none;
        background: #ddd;
        height: 6px;
        border-radius: 3px;
        outline: none;
      }

      .control-group input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #FF6B35;
        cursor: pointer;
        transition: transform 0.1s;
      }

      .control-group input[type="range"]::-webkit-slider-thumb:active {
        transform: scale(1.2);
      }

      #video-overlay-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 75%;
        max-width: 450px;
        display: none; 
        z-index: 1000000;
        pointer-events: auto; 
      }

      .video-wrapper {
        position: relative;
        width: 100%;
        background-color: #000000;
        border: 3px solid white;
        border-radius: 12px;
        box-shadow: 0px 10px 25px rgba(0,0,0,0.6);
        overflow: hidden;
      }

      #ar-video-player {
        width: 100%;
        display: block;
      }

      /* แถบควบคุมวิดีโอแบบ Custom */
      .video-controls {
        display: flex;
        align-items: center;
        background-color: rgba(0, 0, 0, 0.85);
        padding: 8px 12px;
        gap: 10px;
      }

      .video-btn {
        background: none;
        border: none;
        color: white;
        font-size: 16px;
        cursor: pointer;
        outline: none;
        padding: 0 5px;
      }

      .video-timeline {
        flex-grow: 1;
        -webkit-appearance: none;
        background: #555;
        height: 6px;
        border-radius: 3px;
        outline: none;
        cursor: pointer;
      }

      .video-timeline::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #0077B6;
        cursor: pointer;
      }

      .video-time-text {
        color: white;
        font-family: sans-serif;
        font-size: 11px;
        min-width: 35px;
        text-align: center;
      }

      /* ปุ่มปิด (กากบาท) รูปแบบใหม่ เหนือขอบกรอบวิดีโอด้านบนขวา */
      .video-close-top-btn {
        position: absolute;
        top: -45px; 
        right: 0px;  
        background-color: rgba(0, 0, 0, 0.7);
        color: #FF6B35;
        border: 2px solid white;
        width: 34px;
        height: 34px;
        border-radius: 50%;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.4);
        outline: none;
        transition: transform 0.1s ease;
        -webkit-appearance: none;
      }
      .video-close-top-btn:active {
        transform: scale(0.9);
      }

      /* ปรับปรุงกล่องคำอธิบาย (Dashboard Card) */
      #subtitles-box {
        position: relative; 
        margin-top: 12px;   
        width: 100%;        
        box-sizing: border-box;
        background-color: rgba(20, 20, 20, 0.9);
        color: #FFFFFF;
        padding: 16px;
        border-radius: 12px;
        font-family: sans-serif;
        box-shadow: 0px 8px 20px rgba(0,0,0,0.6);
        display: none;
        pointer-events: none;
        text-align: left;
      }

      /* กล่องสีครอบหัวข้อหลัก */
      .sub-title-badge {
        display: inline-block;
        background-color: #FF6B35;
        color: white;
        padding: 4px 12px;
        border-radius: 6px;
        font-size: 15px;
        font-weight: bold;
        margin-bottom: 10px;
        letter-spacing: 0.5px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      }

      /* ข้อความคำอธิบายหลัก */
      .sub-description-text {
        font-size: 14px;
        line-height: 1.6;
        color: #E0E0E0;
        font-weight: normal;
        display: block;
      }

      .speak-btn-ui {
        position: absolute;
        pointer-events: auto;
        padding: 6px 12px;
        background-color: #0077B6;
        color: white;
        border: 2px solid white;
        border-radius: 6px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 13px;
        box-shadow: 0px 4px 8px rgba(0,0,0,0.4);
        cursor: pointer;
        display: none;
        transform: translate(-50%, -50%);
        z-index: 100000;
        -webkit-appearance: none;
        white-space: nowrap;
      }
      .speak-btn-ui:active { background-color: #0096C7; }

      #freeze-btn {
        position: absolute;
        bottom: 30px;
        right: 20px;
        pointer-events: auto;
        padding: 14px 24px;
        background-color: #004E98;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 16px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        cursor: pointer;
        -webkit-appearance: none;
        z-index: 100001;
      }
      #freeze-btn.active { background-color: #FF6B35; }
      .mindar-ui-scanning { background: none !important; }
    </style>
  </head>

      const btnUI3Muda = document.getElementById('speak-ui-btn-3muda');

      const btnUI7Muda = document.getElementById('speak-ui-btn-7muda');

      const allSpeakBtnUIsT1 = [btnUI1M, btnUI2M, btnUI3M, btnUI3_1M, btnUI3_2M, btnUI3_3M, btnUI1A, btnUI2A];
      const allSpeakBtnUIsT2 = [btnUI1Muda, btnUI2Muda, btnUI3Muda, btnUI4Muda, btnUI5Muda, btnUI6Muda, btnUI7Muda];

      function updateCameraBrightness(val) {
        const mindarVideo = document.querySelector('body > video');
        if (mindarVideo) {
          const brightnessPercent = 100 - val;
          mindarVideo.style.filter = `brightness(${brightnessPercent}%)`;
        }
      }

      function updateVoiceList() {
        if (!('speechSynthesis' in window)) return;
        allVoices = window.speechSynthesis.getVoices();
        voiceSelect.innerHTML = ''; 

        let filterLang = 'th-TH';
        if (currentLang === 'en') filterLang = 'en-'; 
        if (currentLang === 'jp') filterLang = 'ja-JP';
        if (currentLang === 'cn') filterLang = 'zh-';

        let filteredVoices = allVoices.filter(voice => 
          voice.lang.toLowerCase().replace('_', '-').startsWith(filterLang.toLowerCase())
        );

        filteredVoices.forEach((voice) => {
          const option = document.createElement('option');
          option.value = voice.name;
          let genderLabel = "หญิง"; 
          if (voice.name.includes('Male') || voice.name.includes('David') || voice.name.includes('Kangkang')) {
            genderLabel = "ชาย";
          }
          option.innerText = `เสียง${genderLabel} (${voice.name.split(' ')[0]})`;
          voiceSelect.appendChild(option);
        });

        if(filteredVoices.length === 0) {
          const option = document.createElement('option');
          option.innerText = "ใช้เสียงมาตรฐานเครื่อง";
          voiceSelect.appendChild(option);
        }
      }

      if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = updateVoiceList;
        updateVoiceList();
      }

      function getSelectedVoice() {
        const selectedName = voiceSelect.value;
        return allVoices.find(voice => voice.name === selectedName) || null;
      }

          }
        } else {
          videoPlayer.pause();

          window.speechSynthesis.pause();
        }
      }

      function seekVideo(val) {
        if (videoPlayer.duration) {

          videoPlayer.currentTime = seekTo;
        }
      }

          const secs = Math.floor(videoPlayer.currentTime % 60);
          videoTimeText.innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;

      function performSpeakAction(textMap, htmlMap, videoSrc) {
        resetMediaUI(); 
        const utterance = new SpeechSynthesisUtterance();
        
        if (currentLang === 'th') {
          utterance.text = textMap.th;
          utterance.lang = "th-TH"; 
          subtitlesBox.innerHTML = htmlMap.th;
        } else if (currentLang === 'en') {
          utterance.text = textMap.en || textMap.th;
          utterance.lang = "en-US"; 
          subtitlesBox.innerHTML = htmlMap.en || htmlMap.th;
        } else if (currentLang === 'jp') {
          utterance.text = textMap.jp || textMap.th;
          utterance.lang = "ja-JP"; 
          subtitlesBox.innerHTML = htmlMap.jp || htmlMap.th;
        } else if (currentLang === 'cn') {
          utterance.text = textMap.cn || textMap.th;
          utterance.lang = "zh-CN"; 
          subtitlesBox.innerHTML = htmlMap.cn || htmlMap.th;
        }
        
        utterance.onstart = function() {
          subtitlesBox.style.display = "block";
          if(videoSrc) {
            videoPlayer.src = videoSrc;
            videoContainer.style.display = "block";
            videoPlayer.play().catch(e => console.log("Video auto-play blocked:", e));
          }
        };

        utterance.onend = function() { };
        utterance.onerror = function(e) { }
        
        utterance.rate = parseFloat(speedSelect.value);
        utterance.voice = getSelectedVoice();
        window.speechSynthesis.speak(utterance);
      }
