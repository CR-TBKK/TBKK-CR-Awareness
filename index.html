<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>AR สื่อการสอน: ต้นทุนโรงงาน (แก้ไข)</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      .ar-ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999999;
        pointer-events: none;
      }

      /* สไตล์สำหรับรูปภาพโลโก้/ป้ายที่มุมซ้ายบนสุด */
      .top-left-logo {
        position: absolute;
        top: 20px;
        left: 20px;
        pointer-events: auto; 
        max-width: 120px;      
        height: auto;
        filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.4)); 
        z-index: 1000002;
      }

      /* แถบกล่องควบคุมภาษาและสำเนียงที่มุมขวาบน */
      .lang-container {
        position: absolute;
        top: 20px;
        right: 20px;
        pointer-events: auto;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
        background-color: rgba(0, 0, 0, 0.75);
        padding: 12px 18px;
        border-radius: 16px;
        box-shadow: 0px 4px 15px rgba(0,0,0,0.4);
      }

      .flags-row {
        display: flex;
        gap: 10px;
        margin-bottom: 4px;
      }

      .flag-btn {
        width: 35px;
        height: 25px;
        cursor: pointer;
        border-radius: 4px;
        border: 2px solid transparent;
        transition: all 0.2s ease;
        object-fit: cover;
      }
      .flag-btn.active {
        border-color: #FF6B35;
        transform: scale(1.1);
      }

      .control-group {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 170px;
        color: white;
        font-size: 12px;
        font-family: sans-serif;
      }

      .control-group select {
        width: 115px;
        padding: 4px;
        font-size: 11px;
        border-radius: 4px;
        border: 1px solid #ccc;
        background-color: white;
        color: #333;
        outline: none;
      }

      /* หน้าต่างวิดีโอเด้งกลางหน้าจอ */
      #video-overlay-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 75%;
        max-width: 450px;
        display: none; 
        z-index: 1000000;
        pointer-events: auto; 
      }

      /* กรอบสำหรับตัววิดีโอโดยเฉพาะ */
      .video-wrapper {
        width: 100%;
        background-color: #000000;
        border: 3px solid white;
        border-radius: 12px;
        box-shadow: 0px 10px 25px rgba(0,0,0,0.6);
        overflow: hidden;
      }

      #ar-video-player {
        width: 100%;
        display: block;
      }

      /* กล่องข้อความซับไตเติ้ลให้ต่อท้ายวิดีโอพอดี */
      #subtitles-box {
        position: relative; 
        margin-top: 12px;   
        width: 100%;        
        box-sizing: border-box;
        background-color: rgba(0, 0, 0, 0.82);
        color: #FFFFFF;
        padding: 10px 16px;
        border-radius: 10px;
        font-family: sans-serif;
        font-size: 15px;
        font-weight: bold;
        text-align: center;
        line-height: 1.4;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.5);
        display: none;
        pointer-events: none;
      }

      /* สไตล์พื้นฐานสำหรับปุ่มฟังเสียง (UI) */
      .speak-btn-ui {
        position: absolute;
        pointer-events: auto;
        padding: 6px 12px;
        background-color: #0077B6;
        color: white;
        border: 2px solid white;
        border-radius: 6px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 13px;
        box-shadow: 0px 4px 8px rgba(0,0,0,0.4);
        cursor: pointer;
        display: none; /* ซ่อนไว้ก่อนจนกว่าจะเจอ Target */
        transform: translate(-50%, -50%);
        z-index: 100000;
        -webkit-appearance: none;
        white-space: nowrap;
      }
      .speak-btn-ui:active { background-color: #0096C7; }

      /* ปุ่มล็อกภาพให้ค้างหน้าจอแบบดั้งเดิม */
      #freeze-btn {
        position: absolute;
        bottom: 30px;
        right: 20px;
        pointer-events: auto;
        padding: 14px 24px;
        background-color: #004E98;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 16px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        cursor: pointer;
        -webkit-appearance: none;
      }
      #freeze-btn.active { background-color: #FF6B35; }
      .mindar-ui-scanning { background: none !important; }
    </style>
  </head>

  <body>
    <div class="ar-ui-layer">
      
      <img src="./CRTBKK.png" class="top-left-logo" alt="Logo" />

      <div class="lang-container">
        <div class="flags-row">
          <img id="flag-th" class="flag-btn active" src="https://flagcdn.com/w40/th.png" onclick="setLanguage('th')" title="ภาษาไทย" />
          <img id="flag-en" class="flag-btn" src="https://flagcdn.com/w40/gb.png" onclick="setLanguage('en')" title="English" />
          <img id="flag-jp" class="flag-btn" src="https://flagcdn.com/w40/jp.png" onclick="setLanguage('jp')" title="日本語" />
        </div>
        <div class="control-group">
          <label>🗣️เสียง</label>
          <select id="voice-select"></select>
        </div>
        <div class="control-group">
          <label>⚡ความเร็ว </label>
          <select id="speed-select">
            <option value="0.6">ช้ามาก (0.6x)</option>
            <option value="0.8" selected>ช้า (0.8x)</option>
            <option value="1.0">ปกติ (1.0x)</option>
            <option value="1.2">เร็ว (1.2x)</option>
          </select>
        </div>
      </div>
      
      <div id="video-overlay-container">
        <div class="video-wrapper">
          <video id="ar-video-player" muted playsinline></video>
        </div>
        <div id="subtitles-box"></div>
      </div>

      <button id="speak-ui-btn-1m" class="speak-btn-ui" onclick="speak1M()">🔊</button>
      <button id="speak-ui-btn-2m" class="speak-btn-ui" onclick="speak2M()">🔊</button>
      <button id="speak-ui-btn-3m" class="speak-btn-ui" onclick="speak3M()">🔊</button>
      <button id="speak-ui-btn-3_1m" class="speak-btn-ui" onclick="speak3_1M()">🔊</button>
      <button id="speak-ui-btn-3_2m" class="speak-btn-ui" onclick="speak3_2M()">🔊</button>
      <button id="speak-ui-btn-3_3m" class="speak-btn-ui" onclick="speak3_3M()">🔊</button>

      <button id="freeze-btn" onclick="toggleFreeze()">📌 ล็อกภาพให้ค้างหน้าจอ</button>
    </div>

    <a-scene id="scene" mindar-image="imageTargetSrc: ./What_is_cost.mind; uiScanning: yes; filterMinCF: 0.0001; filterBeta: 0.001;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-entity id="ar-content" visible="false"> 
          
          <a-image src="./Manu_Cost_sign.png" position="-0.28 0.16 0" scale="0.45 0.039 1"></a-image>
          <a-image src="./Admin_Cost_sign.png" position="0.22 0.16 0" scale="0.45 0.039 1"></a-image>

          <a-image id="material-1m" src="./1M.png" position="-0.42 0.12 0" scale="0.18 0.05 1"></a-image>    
          <a-image src="./ingot.png" position="-0.38 0.04 0" scale="0.09 0.07 1"></a-image> 
        
          <a-image id="labor-2m" src="./2M.png" position="-0.42 -0.02 0" scale="0.18 0.06 1"></a-image>
          <a-image src="./Direct_Labor.png" position="-0.40 -0.12 0" scale="0.17 0.11 1"></a-image>

          <a-image id="over-3m" src="./3M.png" position="-0.21 0.12 0" scale="0.20 0.05 1"></a-image>
          <a-image id="over-3_1m" src="./3_1M.png" position="-0.20 0.04 0" scale="0.24 0.05 1"></a-image>
          <a-image id="over-3_2m" src="./3_2M.png" position="-0.22 -0.04 0" scale="0.19 0.06 1"></a-image>
          <a-image id="over-3_3m" src="./3_3M.png" position="-0.22 -0.12 0" scale="0.19 0.06 1"></a-image>          
          
          <a-image src="./Office.png" position="0.28 0.12 0" scale="0.09 0.09 1"></a-image>

        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      let isFrozen = false;
      let targetFound = false;
      let currentLang = 'th'; 
      let allVoices = []; 
      
      // Scene & Camera
      const sceneEl = document.getElementById('scene');
      const cameraEl = document.getElementById('camera');
      const arTarget = document.getElementById('ar-target');
      const arContent = document.getElementById('ar-content');

      // Common UI
      const freezeBtn = document.getElementById('freeze-btn');
      const voiceSelect = document.getElementById('voice-select'); 
      const speedSelect = document.getElementById('speed-select');
      
      // Media UI (Video & Subtitles)
      const videoContainer = document.getElementById('video-overlay-container');
      const videoPlayer = document.getElementById('ar-video-player');
      const subtitlesBox = document.getElementById('subtitles-box');

      // A-Frame Entities (for positioning buttons)
      const ent1M = document.getElementById('material-1m');
      const ent2M = document.getElementById('labor-2m'); 
      const ent3M = document.getElementById('over-3m');
      const ent3_1M = document.getElementById('over-3_1m');
      const ent3_2M = document.getElementById('over-3_2m');
      const ent3_3M = document.getElementById('over-3_3m');

      // HTML UI Buttons
      const btnUI1M = document.getElementById('speak-ui-btn-1m');
      const btnUI2M = document.getElementById('speak-ui-btn-2m'); 
      const btnUI3M = document.getElementById('speak-ui-btn-3m');
      const btnUI3_1M = document.getElementById('speak-ui-btn-3_1m');
      const btnUI3_2M = document.getElementById('speak-ui-btn-3_2m');
      const btnUI3_3M = document.getElementById('speak-ui-btn-3_3m');

      // List of all speak buttons for easy show/hide
      const allSpeakBtnUIs = [btnUI1M, btnUI2M, btnUI3M, btnUI3_1M, btnUI3_2M, btnUI3_3M];


      // ==========================================
      // 1. TTS & Language Logic
      // ==========================================
      function updateVoiceList() {
        if (!('speechSynthesis' in window)) return;
        allVoices = window.speechSynthesis.getVoices();
        voiceSelect.innerHTML = ''; 

        let filterLang = 'th-TH';
        if (currentLang === 'en') filterLang = 'en-'; 
        if (currentLang === 'jp') filterLang = 'ja-JP';

        let filteredVoices = allVoices.filter(voice => 
          voice.lang.toLowerCase().replace('_', '-').startsWith(filterLang.toLowerCase())
        );

        filteredVoices.forEach((voice) => {
          const option = document.createElement('option');
          option.value = voice.name;
          let genderLabel = "หญิง"; 
          if (voice.name.includes('Male') || voice.name.includes('David') || voice.name.includes('Ravi') || voice.name.includes('Google US English')) {
            genderLabel = "ชาย";
          }
          option.innerText = `เสียง${genderLabel} (${voice.name.split(' ')[0]})`;
          voiceSelect.appendChild(option);
        });

        if(filteredVoices.length === 0) {
          const option = document.createElement('option');
          option.innerText = "ใช้เสียงมาตรฐานเครื่อง";
          voiceSelect.appendChild(option);
        }
      }

      if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = updateVoiceList;
        updateVoiceList();
      }

      function getSelectedVoice() {
        const selectedName = voiceSelect.value;
        return allVoices.find(voice => voice.name === selectedName) || null;
      }

      function resetMediaUI() {
        window.speechSynthesis.cancel();
        subtitlesBox.style.display = "none";
        videoPlayer.pause();
        videoPlayer.src = ""; // Clear source to stop buffering
        videoContainer.style.display = "none";
      }

      function setLanguage(lang) {
        resetMediaUI(); 
        currentLang = lang;
        document.querySelectorAll('.flag-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`flag-${lang}`).classList.add('active');
        updateVoiceList();
      }


      // ==========================================
      // 2. AR Target Events
      // ==========================================
      arTarget.addEventListener("targetFound", () => {
        arContent.setAttribute("visible", "true");
        // Show all buttons
        allSpeakBtnUIs.forEach(btn => btn.style.display = "block");
        targetFound = true;
      });

      arTarget.addEventListener("targetLost", () => {
        if (!isFrozen) {
          arContent.setAttribute("visible", "false");
          // Hide all buttons
          allSpeakBtnUIs.forEach(btn => btn.style.display = "none");
          resetMediaUI(); 
          targetFound = false;
        }
      });


      // ==========================================
      // 3. Button Positioning Logic (3D to 2D)
      // ==========================================
      const tempV = new THREE.Vector3();
      
      // Helper function to position one UI button over an A-Frame entity
      function positionButton(entity, button, offsetX, offsetY) {
        if (entity && entity.object3D && cameraEl.components.camera) {
          entity.object3D.getWorldPosition(tempV);
          tempV.project(cameraEl.components.camera.camera);
          
          const x = (tempV.x * 0.5 + 0.5) * window.innerWidth;
          const y = (tempV.y * -0.5 + 0.5) * window.innerHeight;
          
          button.style.left = `${x + offsetX}px`; 
          button.style.top = `${y + offsetY}px`; 
        }
      }

      function updateAllButtonPositions() {
        if ((targetFound || isFrozen) && cameraEl) {
          // Adjust offsets (X, Y) based on visual preference. 
          // positive X goes right, positive Y goes down.
          positionButton(ent1M, btnUI1M, 75, -8);
          positionButton(ent2M, btnUI2M, 70, -8);
          positionButton(ent3M, btnUI3M, 85, -8);   // Offset for 3M
          positionButton(ent3_1M, btnUI3_1M, 95, -8); // Offset for 3_1M
          positionButton(ent3_2M, btnUI3_2M, 75, -8); // Offset for 3_2M
          positionButton(ent3_3M, btnUI3_3M, 75, -8); // Offset for 3_3M
        }
        requestAnimationFrame(updateAllButtonPositions);
      }
      // Start positioning loop
      requestAnimationFrame(updateAllButtonPositions);


      // ==========================================
      // 4. Freeze Screen Logic
      // ==========================================
      function toggleFreeze() {
        isFrozen = !isFrozen;
        const mindarSystem = sceneEl.systems["mindar-image-system"];
        if (isFrozen) {
          if (mindarSystem) mindarSystem.pause(true); 
          freezeBtn.innerText = "🔄 ปล่อยภาพตามกล้อง";
          freezeBtn.classList.add("active");
        } else {
          arContent.setAttribute("visible", "false");
          // Hide all buttons
          allSpeakBtnUIs.forEach(btn => btn.style.display = "none");
          resetMediaUI(); 
          targetFound = false;
          if (mindarSystem) {
            mindarSystem.unpause();
            if (mindarSystem.imageTargeters && mindarSystem.imageTargeters[0]) {
              mindarSystem.activeTargetIndex = -1; // Force re-detection
            }
          }
          freezeBtn.innerText = "📌 ล็อกภาพให้ค้างหน้าจอ";
          freezeBtn.classList.remove("active");
        }
      }


      // ==========================================
      // 5. Generalized Speak & Video Function
      // ==========================================
      function performSpeakAction(textMap, videoSrc) {
        resetMediaUI(); 
        const utterance = new SpeechSynthesisUtterance();
        
        // Select text based on current language
        if (currentLang === 'th') {
          utterance.text = textMap.th;
          utterance.lang = "th-TH"; 
        } else if (currentLang === 'en') {
          utterance.text = textMap.en || textMap.th; // Fallback to TH if EN not provided
          utterance.lang = "en-US"; 
        } else if (currentLang === 'jp') {
          utterance.text = textMap.jp || textMap.th; // Fallback to TH if JP not provided
          utterance.lang = "ja-JP"; 
        }
        
        utterance.onstart = function() {
          // Show subtitles
          subtitlesBox.innerText = utterance.text;
          subtitlesBox.style.display = "block";
          
          // Show and play video
          if(videoSrc) {
            videoPlayer.src = videoSrc;
            videoContainer.style.display = "block";
            videoPlayer.play().catch(e => console.log("Video auto-play blocked:", e));
          }
        };

        utterance.onend = function() {
          hideMedia();
        };
        
        utterance.onerror = function(e) {
          console.error("TTS Error:", e);
          hideMedia();
        }

        function hideMedia() {
          subtitlesBox.style.display = "none";
          videoPlayer.pause();
          videoContainer.style.display = "none"; 
        }
        
        utterance.rate = parseFloat(speedSelect.value);
        utterance.voice = getSelectedVoice();
        window.speechSynthesis.speak(utterance);
      }

      // ==========================================
      // 6. Specific Action Functions (Click handlers)
      // ==========================================
      
      // --- เดิม ---
      function speak1M() {
        performSpeakAction({
          th: "วัตถุดิบทางตรง หมายถึง วัตถุดิบหลักที่ใช้ในการผลิต เช่น อลูมิเนียม",
          en: "Direct materials refer to the primary raw materials used in production, such as aluminum.",
          jp: "直接材料費とは、アルミニウムなど、製品の製造に直接使用される主要な原材料のことです。"
        }, "./video1.mp4");
      }

      function speak2M() {
        performSpeakAction({
          th: "ค่าแรงทางตรง หมายถึง ค่าจ้างหรือค่าตอบแทนของพนักงานที่ทำงานในไลน์ผลิตโดยตรง",
          en: "Direct labor refers to the wages or compensation paid to workers who are directly involved in the production line.",
          jp: "直接労務費とは、製造ラインで直接働く作業員に支払われる賃金や手当てのことです。"
        }, "./video2.mp4");
      }

      // --- เพิ่มใหม่ ---
      function speak3M() {
        performSpeakAction({
          th: "ค่าใช้จ่ายในการผลิต หมายถึง ค่าใช้จ่ายต่างๆ ทีเกิดขึ้นในระหว่างการผลิตสินค้านอกเหนือจากวัตถุดิบและค่าแรงงานทางตรง"
          // เพิ่ม en: "...", jp: "..." ได้ที่นี่ในอนาคต
        }, "./video3.mp4");
      }

      function speak3_1M() {
        performSpeakAction({
          th: "ค่าใช้จ่ายการผลิตอื่น ๆ เช่น ค่าไฟฟา ค่าน้ำประปา ค่าเช่าโรงงาน ค่าซ่อมบํารุง ค่าเสื่อมอาคาร ค่าเสื่อมเครื่องจักร และค่าใช้จ่ายโรงงานอื่น ๆ"
        }, "./video4.mp4");
      }

      function speak3_2M() {
        performSpeakAction({
          th: "ค่าแรงงานทางอ้อม เช่น ค่าจ้างหรือค่าตอบแทนของหน่วยงานสนับสนุนการผลิต เช่น หัวหน้างาน , พนักงานซ่อมบำรุง , ผู้จัดการฝ่ายผลิต"
        }, "./video5.mp4");
      }

      function speak3_3M() {
        performSpeakAction({
          th: "วัตถุดิบทางอ้อม เช่น วัสดุสิ้นเปลืองที่ใช้สนับสนุนการผลิตเช่น น้ำมันหล่อลื่น , เม็ดมีด , ถุงมือ"
        }, "./video6.mp4");
      }

    </script>
  </body>
</html>
