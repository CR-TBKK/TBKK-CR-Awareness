<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>AR สื่อการสอน: ต้นทุนโรงงาน</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      .ar-ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 99999;
        pointer-events: none;
      }

      /* ปุ่มล็อกภาพ */
      #freeze-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        pointer-events: auto;
        padding: 14px 24px;
        background-color: #004E98;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 16px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        cursor: pointer;
        -webkit-appearance: none;
      }
      #freeze-btn.active { background-color: #FF6B35; }

      /* [ปุ่มเปิดเสียงแบบใหม่] เป็นปุ่มบนหน้าจอจริง แต่จะวิ่งไปลอยใต้รูป Ingot ตามพิกัดกล้อง */
      #ingot-audio-btn {
        position: absolute;
        display: none; /* ซ่อนไว้ก่อนจนกว่าจะสแกนเจอภาพ */
        pointer-events: auto;
        padding: 10px 16px;
        background-color: #28a745; 
        color: white;
        border: 2px solid white;
        border-radius: 20px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 14px;
        box-shadow: 0px 4px 8px rgba(0,0,0,0.4);
        cursor: pointer;
        transform: translate(-50%, -50%);
        z-index: 99999;
        -webkit-appearance: none;
      }
      
      .mindar-ui-scanning { background: none !important; }
    </style>
  </head>

  <body>
    <div class="ar-ui-layer">
      <button id="freeze-btn" onclick="toggleFreeze()">📌 ล็อกภาพให้ค้างหน้าจอ</button>
      
      <button id="ingot-audio-btn" onclick="speakIngot()">🔊 LISTEN</button>
    </div>

    <a-scene id="scene" mindar-image="imageTargetSrc: ./targets.mind; uiScanning: yes;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-entity id="ar-content">
          
          <a-text value="FACTORY COSTS" position="0 0.5 0" rotation="0 0 0" color="#FFD700" align="center" width="4" font="mozillavr"></a-text>

          <a-image id="ingot-track" src="./Ingot.png" position="-0.4 0 0" rotation="0 0 0" scale="0.35 0.25 1"></a-image>
          <a-text value="1. Direct Materials" position="-0.4 -0.2 0" rotation="0 0 0" scale="0.35 0.35 0.35" color="#FF6B35" align="center"></a-text>

          <a-image src="./Labor.png" position="0 0 0" rotation="0 0 0" scale="0.35 0.25 1" visible="false"></a-image>
          <a-text value="2. Direct Labor" position="0 -0.2 0" rotation="0 0 0" scale="0.35 0.35 0.35" color="#004E98" align="center"></a-text>
          <a-image src="./Overhead.png" position="0.4 0 0" rotation="0 0 0" scale="0.35 0.25 1" visible="false"></a-image>
          <a-text value="3. Overhead" position="0.4 -0.2 0" rotation="0 0 0" scale="0.35 0.35 0.35" color="#06D6A0" align="center"></a-text>

        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      let isFrozen = false;
      const sceneEl = document.getElementById('scene');
      const freezeBtn = document.getElementById('freeze-btn');
      const audioBtn = document.getElementById('ingot-audio-btn');
      
      const arContent = document.getElementById('ar-content'); 
      const arTarget = document.getElementById('ar-target');
      const ingotTrack = document.getElementById('ingot-track');

      // เจอภาพ -> เปิดแสดงกลุ่มภาพ และเปิดปุ่มเสียง HTML ให้ทำงาน
      arTarget.addEventListener("targetFound", () => {
        if (!isFrozen) {
          arContent.setAttribute("visible", "true");
          audioBtn.style.display = "block";
        }
      });

      // หลุดจากภาพ -> ซ่อนปุ่มเสียง
      arTarget.addEventListener("targetLost", () => {
        if (!isFrozen) {
          audioBtn.style.display = "none";
        }
      });

      // ระบบคำนวณตำแหน่ง: ดึงพิกัดของรูป Ingot ในฉาก 3D มาแปะเป็นพิกัดปุ่มบนหน้าจอ 2D แบบเรียลไทม์
      function syncButtonPos() {
        if (ingotTrack && ingotTrack.object3D && (arContent.getAttribute('visible') === 'true' || isFrozen)) {
          const vector = new THREE.Vector3();
          ingotTrack.object3D.getWorldPosition(vector); //ดึงตำแหน่งรูป Ingot
          
          const camera = sceneEl.camera;
          if (camera) {
            vector.project(camera); // แปลงเข้ามุมมองกล้อง
            
            // แปลงเป็นพิกัดพิกเซลบนหน้าจอมือถือจริง
            const x = (vector.x * 0.5 + 0.5) * window.innerWidth;
            const y = (vector.y * -0.5 + 0.5) * window.innerHeight;
            
            // บังคับให้ปุ่ม HTML สีเขียว ไปลอยอยู่ตำแหน่งใต้รูปภาพพอดีเป๊ะ (ยืดหยุ่นตามจอมือถือทุกรุ่น)
            audioBtn.style.left = x + 'px';
            audioBtn.style.top = (y + 60) + 'px'; // เลข 60 คือระยะห่างให้ลงไปอยู่ข้างใต้รูปพอดีครับ
          }
        }
        requestAnimationFrame(syncButtonPos);
      }
      // เริ่มรันระบบล็อกพิกัดปุ่มตามรูปภาพ
      requestAnimationFrame(syncButtonPos);

      function toggleFreeze() {
        isFrozen = !isFrozen;
        const mindarSystem = sceneEl.systems["mindar-image-system"];
        
        if (isFrozen) {
          if (mindarSystem) mindarSystem.pause(true);
          freezeBtn.innerText = "🔄 ปล่อยภาพตามกล้อง";
          freezeBtn.classList.add("active");
          audioBtn.style.display = "block"; // ล็อกภาพแล้วยังเปิดให้กดฟังเสียงได้ปกติ
        } else {
          if (arContent) arContent.setAttribute("visible", "false"); 
          if (mindarSystem) {
            mindarSystem.unpause(); 
          }
          freezeBtn.innerText = "📌 ล็อกภาพให้ค้างหน้าจอ";
          freezeBtn.classList.remove("active");
          audioBtn.style.display = "none";
        }
      }

      // ฟังก์ชันเสียงพูดอธิบายภาษาไทย (พิมพ์แก้ไขข้อความในนี้ได้ตามใจชอบครับ)
      function speakIngot() {
        window.speechSynthesis.cancel(); // ล้างคิวเสียงเก่าทันทีเพื่อไม่ให้เสียงซ้อนกัน
        
        const utterance = new SpeechSynthesisUtterance("วัตถุดิบทางตรง Direct Materials วัตถุดิบหลักที่ใช้ในการผลิต เช่น อลูมิเนียม");
        utterance.lang = "th-TH"; 
        utterance.rate = 0.95; 
        
        window.speechSynthesis.speak(utterance);
      }
    </script>
  </body>
</html>
