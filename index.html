<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>AR สื่อการสอน: ต้นทุนโรงงาน</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      .ar-ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 99999;
        pointer-events: none;
      }

      #freeze-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        pointer-events: auto;
        padding: 14px 24px;
        background-color: #004E98;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 16px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        cursor: pointer;
        -webkit-appearance: none;
      }
      
      #freeze-btn.active {
        background-color: #FF6B35;
      }
      
      .mindar-ui-scanning { background: none !important; }
    </style>
  </head>

  <body>
    <div class="ar-ui-layer">
      <button id="freeze-btn" onclick="toggleFreeze()">📌 ล็อกภาพให้ค้างหน้าจอ</button>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiScanning: yes;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera id="main-camera" position="0 0 0" look-controls="enabled: false">
        <a-entity id="camera-hud" position="0 0 -1.2" scale="0.7 0.7 0.7" visible="false"></a-entity>
      </a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-entity id="ar-content">
          
          <a-text value="FACTORY COSTS" position="0 0.5 0" rotation="0 0 0" color="#FFD700" align="center" width="4" font="mozillavr"></a-text>

          <a-image src="./Ingot.png" position="-0.4 0 0" rotation="0 0 0" scale="0.35 0.25 1"></a-image>
          <a-text value="1. Direct Materials" position="-0.4 -0.2 0" rotation="0 0 0" scale="0.35 0.35 0.35" color="#FF6B35" align="center"></a-text>

          <a-image src="./Labor.png" position="0 0 0" rotation="0 0 0" scale="0.35 0.25 1"></a-image>
          <a-text value="2. Direct Labor" position="0 -0.2 0" rotation="0 0 0" scale="0.35 0.35 0.35" color="#004E98" align="center"></a-text>

          <a-image src="./Overhead.png" position="0.4 0 0" rotation="0 0 0" scale="0.35 0.25 1"></a-image>
          <a-text value="3. Overhead" position="0.4 -0.2 0" rotation="0 0 0" scale="0.35 0.35 0.35" color="#06D6A0" align="center"></a-text>

        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      let isFrozen = false;
      let hasFoundTargetOnce = false;
      const arContent = document.getElementById('ar-content');
      const arTarget = document.getElementById('ar-target');
      const cameraHud = document.getElementById('camera-hud');
      const btn = document.getElementById('freeze-btn');

      // ดักจับระบบสแกน: ถ้าเจอภาพใบงานสีส้ม ให้เปิดการแสดงผลรูปภาพขึ้นมาปกติ
      arTarget.addEventListener("targetFound", () => {
        hasFoundTargetOnce = true;
        if (!isFrozen) {
          arContent.setAttribute("visible", "true");
        }
      });

      // ถ้ากล้องหลุดจากใบงาน (และไม่ได้กดล็อกไว้) ให้ซ่อนรูปภาพทันที
      arTarget.addEventListener("targetLost", () => {
        if (!isFrozen) {
          arContent.setAttribute("visible", "false");
        }
      });

      function toggleFreeze() {
        // ถ้ากล้องยังสแกนไม่เจอภาพเลยสักครั้งเดียว จะไม่ยอมให้กดล็อกเพื่อป้องกันบั๊กหน้าจอว่างเปล่า
        if (!hasFoundTargetOnce) return;

        isFrozen = !isFrozen;
        
        if (isFrozen) {
          // [จังหวะกดล็อกภาพ] ย้ายภาพจากกระดาษมาแปะไว้ที่กล้องหน้าจอตรงๆ (ติดหนึบ ยกมือถือหนีได้)
          cameraHud.appendChild(arContent);
          arContent.setAttribute("visible", "true");
          cameraHud.setAttribute("visible", "true");
          
          btn.innerText = "🔄 ปล่อยภาพเพื่อ SCAN ใหม่";
          btn.classList.add("active");
        } else {
          // [จังหวะกดปล่อยสแกนใหม่] ล้างภาพออกจากจอกล้อง
          cameraHud.setAttribute("visible", "false");
          
          // โยนเนื้อหากลับไปให้ระบบสแกน AR ของแผ่นงาน
          arTarget.appendChild(arContent);
          
          // สั่งให้ภาพซ่อนตัว (หายไปทันที) เพื่อบังคับให้ผู้เรียนต้องเอากล้องไปส่องสแกนหาแผ่นงานสีส้มใหม่อีกรอบ
          arContent.setAttribute("visible", "false");
          
          btn.innerText = "📌 ล็อกภาพให้ค้างหน้าจอ";
          btn.classList.remove("active");
        }
      }
    </script>
  </body>
</html>
