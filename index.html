<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>AR สื่อการสอน: ต้นทุนโรงงาน</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      .ar-ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 99999;
        pointer-events: none;
      }

      /* เหลือเฉพาะปุ่มล็อกภาพไว้บนหน้าจอมือถือ */
      #freeze-btn {
        position: absolute;
        top: 20px;
        right: 20px;
        pointer-events: auto;
        padding: 14px 24px;
        background-color: #004E98;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 16px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        cursor: pointer;
        -webkit-appearance: none;
      }
      #freeze-btn.active { background-color: #FF6B35; }
      .mindar-ui-scanning { background: none !important; }
    </style>
  </head>

  <body>
    <div class="ar-ui-layer">
      <button id="freeze-btn" onclick="toggleFreeze()">📌 ล็อกภาพให้ค้างหน้าจอ</button>
    </div>

    <a-scene id="scene" mindar-image="imageTargetSrc: ./targets.mind; uiScanning: yes;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" raycaster="objects: .clickable" cursor="fuse: false; rayOrigin: mouse">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-entity id="ar-content">
          
          <a-text value="FACTORY COSTS" position="0 0.5 0" rotation="0 0 0" color="#FFD700" align="center" width="4" font="mozillavr"></a-text>

          <a-image src="./Ingot.png" position="-0.4 0.05 0" rotation="0 0 0" scale="0.35 0.25 1"></a-image>
          <a-text value="1. Direct Materials" position="-0.4 -0.12 0" rotation="0 0 0" scale="0.32 0.32 0.32" color="#FF6B35" align="center"></a-text>
          
          <a-plane class="clickable" position="-0.4 -0.27 0" width="0.3" height="0.08" color="#28a745" material="shader: flat" onclick="speakThai('วัตถุดิบทางตรง แดแร็ก แมตทีเรียลส์ วัตถุดิบหลักที่ใช้ในการผลิต เช่น อลูมิเนียม')">
            <a-text value="LISTEN 🔊" color="white" align="center" scale="0.25 0.25 0.25" position="0 0 0.01"></a-text>
          </a-plane>


          <a-image src="./Labor.png" position="0 0.05 0" rotation="0 0 0" scale="0.35 0.25 1" visible="false"></a-image>
          <a-text value="2. Direct Labor" position="0 -0.12 0" rotation="0 0 0" scale="0.32 0.32 0.32" color="#004E98" align="center"></a-text>
          
          <a-plane class="clickable" position="0 -0.27 0" width="0.3" height="0.08" color="#004E98" material="shader: flat" onclick="speakThai('สอง ค่าแรงทางตรง แดแร็ก เลเบอร์ คือค่าจ้างของพนักงานในสายการผลิตโดยตรงครับ')">
            <a-text value="LISTEN 🔊" color="white" align="center" scale="0.25 0.25 0.25" position="0 0 0.01"></a-text>
          </a-plane>


          <a-image src="./Overhead.png" position="0.4 0.05 0" rotation="0 0 0" scale="0.35 0.25 1" visible="false"></a-image>
          <a-text value="3. Overhead" position="0.4 -0.12 0" rotation="0 0 0" scale="0.32 0.32 0.32" color="#06D6A0" align="center"></a-text>
          
          <a-plane class="clickable" position="0.4 -0.27 0" width="0.3" height="0.08" color="#06D6A0" material="shader: flat" onclick="speakThai('สาม ค่าใช้จ่ายการผลิต โอเวอร์เฮด คือค่าไฟ ค่าน้ำ หรือค่าเสื่อมเครื่องจักรในโรงงานครับ')">
            <a-text value="LISTEN 🔊" color="white" align="center" scale="0.25 0.25 0.25" position="0 0 0.01"></a-text>
          </a-plane>

        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      let isFrozen = false;
      const sceneEl = document.getElementById('scene');
      const btn = document.getElementById('freeze-btn');
      
      const arContent = document.getElementById('ar-content'); 
      const arTarget = document.getElementById('ar-target');

      arTarget.addEventListener("targetFound", () => {
        if (!isFrozen) {
          arContent.setAttribute("visible", "true");
        }
      });

      function toggleFreeze() {
        isFrozen = !isFrozen;
        const mindarSystem = sceneEl.systems["mindar-image-system"];
        
        if (isFrozen) {
          if (mindarSystem) mindarSystem.pause(true);
          btn.innerText = "🔄 ปล่อยภาพเพื่อ SCAN ใหม่";
          btn.classList.add("active");
        } else {
          if (arContent) arContent.setAttribute("visible", "false"); 
          if (mindarSystem) {
            mindarSystem.unpause(); 
          }
          btn.innerText = "📌 ล็อกภาพให้ค้างหน้าจอ";
          btn.classList.remove("active");
        }
      }

      // ระบบสั่งงานเสียงพูด
      function speakThai(message) {
        window.speechSynthesis.cancel(); // ตัดเสียงเก่าทันทีเวลาเด็กกดสลับไปมา
        
        const utterance = new SpeechSynthesisUtterance(message);
        utterance.lang = "th-TH"; 
        utterance.rate = 0.95; 
        
        window.speechSynthesis.speak(utterance);
      }
    </script>
  </body>
</html>
