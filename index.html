<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>AR สื่อการสอน: ต้นทุนโรงงาน</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      .ar-ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999999;
        pointer-events: none;
      }

      /* ปุ่มที่ 1: ฟังเสียง วัตถุดิบทางตรง (ท้ายรูป 1M.png) */
      #speak-ui-btn {
        position: absolute;
        pointer-events: auto;
        padding: 6px 12px;
        background-color: #0077B6;
        color: white;
        border: 2px solid white;
        border-radius: 6px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 13px;
        box-shadow: 0px 4px 8px rgba(0,0,0,0.4);
        cursor: pointer;
        display: none;
        transform: translate(-50%, -50%);
        z-index: 100000;
        -webkit-appearance: none;
        white-space: nowrap;
      }

      /* ปุ่มที่ 2: ฟังเสียง ค่าแรงทางตรง (ท้ายรูป 2M.png) */
      #speak-ui-btn2 {
        position: absolute;
        pointer-events: auto;
        padding: 6px 12px;
        background-color: #0077B6; /* ใช้สีเขียวเพื่อให้แยกแยะง่ายขึ้น */
        color: white;
        border: 2px solid white;
        border-radius: 6px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 13px;
        box-shadow: 0px 4px 8px rgba(0,0,0,0.4);
        cursor: pointer;
        display: none;
        transform: translate(-50%, -50%);
        z-index: 100000;
        -webkit-appearance: none;
        white-space: nowrap;
      }

      #freeze-btn {
        position: absolute;
        bottom: 30px;
        right: 20px;
        pointer-events: auto;
        padding: 14px 24px;
        background-color: #004E98;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 16px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        cursor: pointer;
        -webkit-appearance: none;
      }
      #freeze-btn.active { background-color: #FF6B35; }
      .mindar-ui-scanning { background: none !important; }
    </style>
  </head>

  <body>
    <div class="ar-ui-layer">
      <button id="speak-ui-btn" onclick="speakCustomIngot()">🔊</button>
      <button id="speak-ui-btn2" onclick="speakCustomLabor()">🔊</button>
      <button id="freeze-btn" onclick="toggleFreeze()">📌 ล็อกภาพให้ค้างหน้าจอ</button>
    </div>

    <a-scene id="scene" mindar-image="imageTargetSrc: ./What_is_cost.mind; uiScanning: yes; filterMinCF: 0.0001; filterBeta: 0.001;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-camera id="camera" position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-entity id="ar-content" visible="false">
          
          <a-image src="./Manu_Cost_sign.png" position="-0.28 0.16 0" scale="0.45 0.039 1"></a-image>
          <a-image src="./Admin_Cost_sign.png" position="0.22 0.16 0" scale="0.45 0.039 1"></a-image>

          <a-image id="material-1m" src="./1M.png" position="-0.42 0.12 0" scale="0.18 0.05 1"></a-image> 
          
          <a-image src="./ingot.png" position="-0.38 0.04 0" scale="0.09 0.07 1"></a-image> 
        
          <a-image id="labor-2m" src="./2M.png" position="-0.42 -0.02 0" scale="0.18 0.06 1"></a-image>
          <a-image src="./Direct_Labor.png" position="-0.40 -0.12 0" scale="0.17 0.11 1"></a-image>
          
          <a-image src="./Office.png" position="0.28 0.01 0" scale="0.09 0.09 1"></a-image>

        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      let isFrozen = false;
      let targetFound = false;
      
      const sceneEl = document.getElementById('scene');
      const cameraEl = document.getElementById('camera');
      const freezeBtn = document.getElementById('freeze-btn');
      const speakUiBtn = document.getElementById('speak-ui-btn');
      const speakUiBtn2 = document.getElementById('speak-ui-btn2'); // ดึงค่าปุ่มที่ 2
      const material1M = document.getElementById('material-1m');
      const labor2M = document.getElementById('labor-2m'); // ดึงค่าวัตถุ 2M
      const arTarget = document.getElementById('ar-target');
      const arContent = document.getElementById('ar-content');

      arTarget.addEventListener("targetFound", () => {
        arContent.setAttribute("visible", "true");
        speakUiBtn.style.display = "block";
        speakUiBtn2.style.display = "block"; // แสดงปุ่มที่ 2
        targetFound = true;
      });

      arTarget.addEventListener("targetLost", () => {
        if (!isFrozen) {
          arContent.setAttribute("visible", "false");
          speakUiBtn.style.display = "none";
          speakUiBtn2.style.display = "none"; // ซ่อนปุ่มที่ 2
          targetFound = false;
        }
      });

      // ระบบอัปเดตพิกัด Real-time ของทั้ง 2 ปุ่ม
      const tempV = new THREE.Vector3();
      const tempV2 = new THREE.Vector3(); // เวกเตอร์เพิ่มสำหรับคำนวณตำแหน่งวัตถุชิ้นที่ 2
      
      function updateButtonPosition() {
        if ((targetFound || isFrozen) && cameraEl) {
          
          // --- คำนวณและเลื่อนปุ่มที่ 1 (ต่อท้าย 1M) ---
          if (material1M) {
            material1M.object3D.getWorldPosition(tempV);
            tempV.project(cameraEl.components.camera.camera);
            const x1 = (tempV.x * .5 + .5) * window.innerWidth;
            const y1 = (tempV.y * -.5 + .5) * window.innerHeight;
            speakUiBtn.style.left = `${x1 + 75}px`; 
            speakUiBtn.style.top = `${y1 - 15}px`; 
          }

          // --- คำนวณและเลื่อนปุ่มที่ 2 (ต่อท้าย 2M) ---
          if (labor2M) {
            labor2M.object3D.getWorldPosition(tempV2);
            tempV2.project(cameraEl.components.camera.camera);
            const x2 = (tempV2.x * .5 + .5) * window.innerWidth;
            const y2 = (tempV2.y * -.5 + .5) * window.innerHeight;
            speakUiBtn2.style.left = `${x2 + 70}px`; // ขยับไปทางขวา 65px เท่ากัน
            speakUiBtn2.style.top = `${y2 - 12}px`;  // ระดับความสูงกึ่งกลางรูปภาพพอดี
          }
        }
        requestAnimationFrame(updateButtonPosition);
      }
      requestAnimationFrame(updateButtonPosition);

      function toggleFreeze() {
        isFrozen = !isFrozen;
        const mindarSystem = sceneEl.systems["mindar-image-system"];
        
        if (isFrozen) {
          if (mindarSystem) mindarSystem.pause(true); 
          freezeBtn.innerText = "🔄 ปล่อยภาพตามกล้อง";
          freezeBtn.classList.add("active");
        } else {
          arContent.setAttribute("visible", "false");
          speakUiBtn.style.display = "none";
          speakUiBtn2.style.display = "none"; // ซ่อนปุ่มเสียงที่ 2 เมื่อสแกนหลุด
          targetFound = false;
          
          if (mindarSystem) {
            mindarSystem.unpause();
            if (mindarSystem.imageTargeters && mindarSystem.imageTargeters[0]) {
              mindarSystem.activeTargetIndex = -1; 
            }
          }
          
          freezeBtn.innerText = "📌 ล็อกภาพให้ค้างหน้าจอ";
          freezeBtn.classList.remove("active");
        }
      }

      // เสียงตัวที่ 1: วัตถุดิบทางตรง
      function speakCustomIngot() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("วัตถุดิบทางตรง หมายถึง วัตถุดิบหลักที่ใช้ในการผลิต เช่น อลูมิเนียม");
        utterance.lang = "th-TH"; 
        utterance.rate = 0.90; 
        window.speechSynthesis.speak(utterance);
      }

      // เสียงตัวที่ 2: ค่าแรงทางตรง (ฟังก์ชันใหม่ตามที่คุณต้องการ)
      function speakCustomLabor() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("ค่าแรงทางตรง หมายถึง ค่าจ้างหรือค่าตอบแทนของพนักงานที่ทำงานในไลน์ผลิตโดยตรง");
        utterance.lang = "th-TH"; 
        utterance.rate = 0.90; 
        window.speechSynthesis.speak(utterance);
      }

      function speakIngot() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("วัตถุดิบทางตรง Direct Materials วัตถุดิบหลักที่ใช้ในการผลิตสินค้า เช่น อลูมิเนียม");
        utterance.lang = "th-TH"; utterance.rate = 0.95; window.speechSynthesis.speak(utterance);
      }

      function speakLabor() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("ค่าแรงงานทางตรง Direct Labor ค่าแรงของพนักงานฝ่ายผลิตที่มีหน้าที่เปลี่ยนสภาพวัตถุดิบให้เป็นสินค้าโดยตรง");
        utterance.lang = "th-TH"; utterance.rate = 0.95; window.speechSynthesis.speak(utterance);
      }

      function speakOffice() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("ค่าใช้จ่ายในการบริหาร Administrative Expenses ค่าใช้จ่ายที่เกิดขึ้นในการบริหารงานทั่วไป เช่น เงินเดือนพนักงานออฟฟิศ ค่าน้ำไฟสำนักงาน");
        utterance.lang = "th-TH"; utterance.rate = 0.95; window.speechSynthesis.speak(utterance);
      }
    </script>
  </body>
</html>
