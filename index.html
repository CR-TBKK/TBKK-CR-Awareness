<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />
    <title>AR สื่อการสอน: ต้นทุนโรงงาน</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
      
      .ar-ui-layer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999999;
        pointer-events: none;
      }

      #freeze-btn {
        position: absolute;
        bottom: 30px;
        right: 20px;
        pointer-events: auto;
        padding: 14px 24px;
        background-color: #004E98;
        color: white;
        border: 2px solid white;
        border-radius: 8px;
        font-weight: bold;
        font-family: sans-serif;
        font-size: 16px;
        box-shadow: 0px 4px 10px rgba(0,0,0,0.5);
        cursor: pointer;
        -webkit-appearance: none;
      }
      #freeze-btn.active { background-color: #FF6B35; }
      .mindar-ui-scanning { background: none !important; }
    </style>
  </head>

  <body>
    <div class="ar-ui-layer">
      <button id="freeze-btn" onclick="toggleFreeze()">📌 ล็อกภาพให้ค้างหน้าจอ</button>
    </div>

    <a-scene id="scene" mindar-image="imageTargetSrc: ./What_is_cost.mind; uiScanning: yes; filterMinCF: 0.0001; filterBeta: 0.001;" embedded color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false" raycaster="objects: .clickable; far: 100; interval: 100" cursor="fuse: false; rayOrigin: mouse">
      
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="ar-target" mindar-image-target="targetIndex: 0">
        <a-entity id="ar-content" visible="false">
          
          <a-image src="./Manu_Cost_sign.png" position="-0.28 0.16 0" scale="0.45 0.039 1"></a-image>
          <a-image src="./Admin_Cost_sign.png" position="0.22 0.16 0" scale="0.45 0.039 1"></a-image>

          <a-image src="./Ingot.png" position="-0.33 0.01 0" scale="0.12 0.09 1"></a-image>
          <a-text value="1. Direct Materials" position="-0.33 -0.06 0.02" scale="0.22 0.22 0.22" color="#FF6B35" align="center"></a-text>
          <a-plane class="clickable" position="-0.33 0.01 0.02" width="0.14" height="0.14" material="opacity: 0.0; transparent: true" onclick="speakIngot()"></a-plane>

          <a-image src="./Direct_Labor.png" position="-0.08 0.01 0" scale="0.09 0.09 1"></a-image>
          <a-text value="2. Direct Labor" position="-0.08 -0.06 0.02" scale="0.22 0.22 0.22" color="#004E98" align="center"></a-text>
          <a-plane class="clickable" position="-0.08 0.01 0.02" width="0.12" height="0.12" material="opacity: 0.0; transparent: true" onclick="speakLabor()"></a-plane>

          <a-image src="./Office.png" position="0.28 0.01 0" scale="0.09 0.09 1"></a-image>
          <a-text value="3. Admin Expenses" position="0.28 -0.06 0.02" scale="0.22 0.22 0.22" color="#2F3E46" align="center"></a-text>
          <a-plane class="clickable" position="0.28 0.01 0.02" width="0.12" height="0.12" material="opacity: 0.0; transparent: true" onclick="speakOffice()"></a-plane>

        </a-entity>
      </a-entity>
    </a-scene>

    <script>
      let isFrozen = false;
      const sceneEl = document.getElementById('scene');
      const freezeBtn = document.getElementById('freeze-btn');
      const arTarget = document.getElementById('ar-target');
      const arContent = document.getElementById('ar-content');

      arTarget.addEventListener("targetFound", () => {
        arContent.setAttribute("visible", "true");
      });

      arTarget.addEventListener("targetLost", () => {
        if (!isFrozen) {
          arContent.setAttribute("visible", "false");
        }
      });

      function toggleFreeze() {
        isFrozen = !isFrozen;
        const mindarSystem = sceneEl.systems["mindar-image-system"];
        
        if (isFrozen) {
          if (mindarSystem) mindarSystem.pause(true); 
          freezeBtn.innerText = "🔄 ปล่อยภาพตามกล้อง";
          freezeBtn.classList.add("active");
        } else {
          arContent.setAttribute("visible", "false");
          
          if (mindarSystem) {
            mindarSystem.unpause();
            if (mindarSystem.imageTargeters && mindarSystem.imageTargeters[0]) {
              mindarSystem.activeTargetIndex = -1; 
            }
          }
          
          freezeBtn.innerText = "📌 ล็อกภาพให้ค้างหน้าจอ";
          freezeBtn.classList.remove("active");
        }
      }

      function speakIngot() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("วัตถุดิบทางตรง Direct Materials วัตถุดิบหลักที่ใช้ในการผลิตสินค้า เช่น อลูมิเนียม");
        utterance.lang = "th-TH"; utterance.rate = 0.95; window.speechSynthesis.speak(utterance);
      }

      function speakLabor() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("ค่าแรงงานทางตรง Direct Labor ค่าแรงของพนักงานฝ่ายผลิตที่มีหน้าที่เปลี่ยนสภาพวัตถุดิบให้เป็นสินค้าโดยตรง");
        utterance.lang = "th-TH"; utterance.rate = 0.95; window.speechSynthesis.speak(utterance);
      }

      function speakOffice() {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance("ค่าใช้จ่ายในการบริหาร Administrative Expenses ค่าใช้จ่ายที่เกิดขึ้นในการบริหารงานทั่วไป เช่น เงินเดือนพนักงานออฟฟิศ ค่าน้ำไฟสำนักงาน");
        utterance.lang = "th-TH"; utterance.rate = 0.95; window.speechSynthesis.speak(utterance);
      }
    </script>
  </body>
</html>
