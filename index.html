<!DOCTYPE html>
<html>
  <head>
    <title>AR Factory Costs</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <a-marker preset="hiro">
        
        <a-box position="-1 0.5 0" scale="0.5 1 0.5" material="color: #FF6B35;"></a-box>
        <a-text value="1. Materials" position="-1 1.2 0" scale="1.5 1.5 1.5" color="#FF6B35" align="center"></a-text>

        <a-box position="0 0.5 0" scale="0.5 1 0.5" material="color: #004E98;"></a-box>
        <a-text value="2. Labor" position="0 1.2 0" scale="1.5 1.5 1.5" color="#004E98" align="center"></a-text>

        <a-box position="1 0.5 0" scale="0.5 1 0.5" material="color: #06D6A0;"></a-box>
        <a-text value="3. Overhead" position="1 1.2 0" scale="1.5 1.5 1.5" color="#06D6A0" align="center"></a-text>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
