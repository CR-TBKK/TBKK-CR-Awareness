<!DOCTYPE html>
<html>
<head>
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0"/>

<title>AR สื่อการสอน: ต้นทุนโรงงาน</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
html,body{
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
}

.ar-ui-layer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:999999;
  pointer-events:none;
}

#freeze-btn{
  position:absolute;
  bottom:30px;
  right:20px;
  pointer-events:auto;
  padding:14px 24px;
  background:#004E98;
  color:white;
  border:2px solid white;
  border-radius:8px;
  font-weight:bold;
  font-size:16px;
  cursor:pointer;
  box-shadow:0px 4px 10px rgba(0,0,0,0.5);
}

#freeze-btn.active{
  background:#FF6B35;
}

.mindar-ui-scanning{
  background:none !important;
}
</style>

</head>

<body>

<div class="ar-ui-layer">
  <button id="freeze-btn" onclick="toggleFreeze()">
    📌 ล็อกภาพให้ค้างหน้าจอ
  </button>
</div>

<a-scene
  id="scene"
  mindar-image="
    imageTargetSrc: ./What_is_cost.mind;
    uiScanning: yes;
    filterMinCF: 0.0001;
    filterBeta: 0.001;"
  embedded
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <a-camera
    position="0 0 0"
    look-controls="enabled:false"
    raycaster="objects: .clickable; far:100;"
    cursor="fuse:false; rayOrigin:mouse">
  </a-camera>

  <a-entity id="ar-target" mindar-image-target="targetIndex: 0">

    <a-entity id="ar-content" visible="false">

      <!-- Manufacturing Cost -->
      <a-image
        src="./Manu_Cost_sign.png"
        position="-0.28 0.16 0"
        scale="0.45 0.039 1">
      </a-image>

      <!-- Admin Cost -->
      <a-image
        src="./Admin_Cost_sign.png"
        position="0.22 0.16 0"
        scale="0.45 0.039 1">
      </a-image>

      <!-- 1M -->
      <a-image
        src="./1M.png"
        position="-0.42 0.12 0"
        scale="0.18 0.05 1">
      </a-image>

      <!-- Speaker Button -->
      <a-image
        id="spk-ingot"
        class="clickable"
        src="./1.M_SPK.png"
        position="-0.22 0.12 0"
        scale="0.05 0.05 1">
      </a-image>

      <!-- Invisible Hitbox -->
      <a-plane
        id="spk-ingot-hitbox"
        class="clickable"
        position="-0.22 0.12 0.01"
        width="0.10"
        height="0.10"
        material="opacity:0; transparent:true">
      </a-plane>

      <!-- Ingot -->
      <a-image
        src="./ingot.png"
        position="-0.38 0.04 0"
        scale="0.09 0.07 1">
      </a-image>

      <!-- 2M -->
      <a-image
        src="./2M.png"
        position="-0.42 -0.02 0"
        scale="0.18 0.06 1">
      </a-image>

      <!-- Labor -->
      <a-image
        src="./Direct_Labor.png"
        position="-0.40 -0.12 0"
        scale="0.17 0.11 1">
      </a-image>

      <!-- Office -->
      <a-image
        src="./Office.png"
        position="0.28 0.01 0"
        scale="0.09 0.09 1">
      </a-image>

    </a-entity>

  </a-entity>

</a-scene>

<script>

let isFrozen = false;

const sceneEl = document.getElementById("scene");
const freezeBtn = document.getElementById("freeze-btn");
const arTarget = document.getElementById("ar-target");
const arContent = document.getElementById("ar-content");

arTarget.addEventListener("targetFound", () => {
  arContent.setAttribute("visible", "true");
});

arTarget.addEventListener("targetLost", () => {
  if(!isFrozen){
    arContent.setAttribute("visible","false");
  }
});

function toggleFreeze(){

  isFrozen = !isFrozen;

  const mindarSystem =
    sceneEl.systems["mindar-image-system"];

  if(isFrozen){

    if(mindarSystem){
      mindarSystem.pause(true);
    }

    freezeBtn.innerText =
      "🔄 ปล่อยภาพตามกล้อง";

    freezeBtn.classList.add("active");

  }else{

    arContent.setAttribute("visible","false");

    if(mindarSystem){

      mindarSystem.unpause();

      if(
        mindarSystem.imageTargeters &&
        mindarSystem.imageTargeters[0]
      ){
        mindarSystem.activeTargetIndex = -1;
      }
    }

    freezeBtn.innerText =
      "📌 ล็อกภาพให้ค้างหน้าจอ";

    freezeBtn.classList.remove("active");
  }
}

/* ===========================
   Text To Speech
=========================== */

function speak(text){

  window.speechSynthesis.cancel();

  const utterance =
    new SpeechSynthesisUtterance(text);

  utterance.lang = "th-TH";
  utterance.rate = 0.95;

  window.speechSynthesis.speak(utterance);
}

/* ===========================
   Speaker Button
=========================== */

window.addEventListener("load",()=>{

  const speaker =
    document.getElementById("spk-ingot");

  const hitbox =
    document.getElementById("spk-ingot-hitbox");

  const playVoice = ()=>{

    speaker.setAttribute(
      "animation",
      "property: scale; \
       to: 0.065 0.065 1; \
       dur: 120; \
       dir: alternate; \
       loop: 2"
    );

    speak(
      "วัตถุดิบทางตรง วัตถุดิบหลักที่ใช้ในการผลิต เช่น อลูมิเนียม"
    );
  };

  [
    speaker,
    hitbox
  ].forEach(el=>{

    if(!el) return;

    el.addEventListener("click",playVoice);
    el.addEventListener("mousedown",playVoice);
    el.addEventListener("touchstart",playVoice);

  });

});

</script>

</body>
</html>
